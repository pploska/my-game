<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Locker Room - Saudi Team</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root {
      --bg-dark: #050505;
      --panel-bg: rgba(15, 15, 15, 0.7);
      --input-bg: rgba(255, 255, 255, 0.03);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-green: #2d5a3f;
      --primary-green-hover: #3a7551;
      --text-main: #ffffff;
      --text-muted: #8b8b8b;
      --glow-green: rgba(74, 222, 128, 0.3);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; 
      min-height: 100vh;
      background-image: 
        linear-gradient(to right, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.9) 100%), 
        url('bg.jpg');
      background-size: cover; 
      background-position: center; 
      background-color: var(--bg-dark);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      display: flex; 
      align-items: center; 
      justify-content: space-between;
      color: var(--text-main); 
      overflow-x: hidden;
      transition: background-image 0.5s ease-in-out;
    }

    /* الأيقونات العائمة */
    .top-left-actions {
      position: fixed; top: 30px; left: 30px;
      display: none; 
      flex-direction: column; gap: 15px; z-index: 50;
    }
    .icon-btn {
      background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px);
      border: 1px solid var(--border-color); width: 50px; height: 50px;
      border-radius: 14px; color: var(--text-muted); cursor: pointer;
      font-size: 20px; transition: all 0.3s ease;
      display: flex; justify-content: center; align-items: center;
    }
    .icon-btn:hover { color: #4ade80; border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.2); }

    /* القائمة الجانبية (Sidebar) */
    .sidebar { width: 300px; margin-left: 120px; display: flex; flex-direction: column; z-index: 10; }

    .logo-container { margin-bottom: 50px; }
    .logo-container i { font-size: 30px; color: #4ade80; }

    .welcome-text { margin-bottom: 40px; }
    .welcome-text p { color: #4ade80; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
    .welcome-text h1 { font-size: 32px; font-weight: 600; line-height: 1.2; }

    .menu-items { display: flex; flex-direction: column; gap: 15px; }
    
    .menu-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px 0; color: var(--text-muted); cursor: pointer;
      font-size: 16px; font-weight: 500; border-bottom: 1px solid transparent; transition: all 0.3s ease;
    }
    .menu-item:hover, .menu-item.active { color: var(--text-main); }
    .menu-item.active { border-bottom: 1px solid #4ade80; box-shadow: 0 4px 10px -4px var(--glow-green); }

    .dashboard-menu { display: none; margin-top: 20px; }
    .dash-item {
      display: flex; align-items: center; gap: 15px; padding: 12px 20px;
      margin-bottom: 10px; border-radius: 10px; color: var(--text-muted);
      cursor: pointer; transition: all 0.3s ease;
    }
    .dash-item:hover { background: var(--input-bg); color: var(--text-main); }
    .dash-item.active { background: var(--primary-green); color: var(--text-main); }

    /* النوافذ الزجاجية */
    .forms-wrapper { margin-right: 8%; position: relative; width: 420px; min-height: 550px; z-index: 10; }

    .glass-panel {
      position: absolute; top: 0; right: 0; width: 100%;
      background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border-color); border-radius: 24px; padding: 40px;
      opacity: 0; visibility: hidden; transform: translateY(20px); transition: all 0.4s ease;
    }
    .glass-panel.show { opacity: 1; visibility: visible; transform: translateY(0); }

    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 30px; }
    .panel-header h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
    .panel-header p { color: var(--text-muted); font-size: 14px; }
    
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .input-field {
      position: relative; display: flex; align-items: center;
      background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px;
      padding: 0 15px; transition: all 0.3s ease;
    }
    .input-field:focus-within { border-color: #4ade80; background: rgba(255,255,255,0.05); }
    .input-field i { color: var(--text-muted); font-size: 14px; }
    .input-field input {
      width: 100%; padding: 15px 10px; background: transparent; border: none;
      color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 14px; outline: none;
    }
    .eye-icon { cursor: pointer; }

    .btn-main {
      width: 100%; padding: 15px; background: linear-gradient(180deg, #3a7551 0%, #1f3b29 100%);
      border: 1px solid rgba(74, 222, 128, 0.2); border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .btn-main:hover { filter: brightness(1.1); box-shadow: 0 5px 15px rgba(45, 90, 63, 0.4); }

    .btn-outline {
      width: 100%; padding: 15px; background: transparent;
      border: 1px solid var(--border-color); border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }

    .divider { display: flex; align-items: center; text-align: center; margin: 25px 0; color: var(--text-muted); font-size: 12px; }
    .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--border-color); }
    .divider::before { margin-right: .25em; } .divider::after { margin-left: .25em; }

    .jersey-grid { display: flex; gap: 10px; margin-bottom: 20px; }
    .jersey-grid > div { flex: 1; }
    .number-selector { display: flex; align-items: center; justify-content: space-between; background: var(--input-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px 15px; }
    .number-selector i { cursor: pointer; color: var(--text-muted); }
    .number-selector input { width: 40px; text-align: center; background: transparent; border: none; color: #fff; font-size: 16px; font-weight: bold; outline: none; }

    /* ========================================= */
    /* ملف تعريفي - أفاتار ونظام التعديل */
    /* ========================================= */
    .profile-avatar-section {
      text-align: center; margin-bottom: 30px; position: relative;
    }
    .profile-avatar-container {
      position: relative; display: inline-block;
      width: 120px; height: 120px; border-radius: 50%;
      border: 2px solid #4ade80; padding: 5px; cursor: pointer;
      box-shadow: 0 0 20px rgba(74, 222, 128, 0.3); transition: all 0.3s ease;
    }
    .profile-avatar-container:hover { box-shadow: 0 0 30px rgba(74, 222, 128, 0.5); transform: scale(1.05); }
    .profile-avatar-container img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
    .edit-avatar-overlay {
      position: absolute; bottom: 0; right: 0;
      width: 35px; height: 35px; background: #4ade80;
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      color: #000; font-size: 14px; border: 3px solid var(--panel-bg);
    }

    /* نافذة اختيار الأفاتار (Avatar Selector) */
    .avatar-selector-popup {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000;
      display: none; justify-content: center; align-items: center;
    }
    .avatar-selector-popup.show { display: flex; }
    .avatar-selector-box {
      background: var(--panel-bg); border: 1px solid var(--border-color);
      border-radius: 24px; padding: 30px; max-width: 500px; width: 90%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    }
    .avatar-selector-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px;
    }
    .avatar-option {
      width: 100%; padding-top: 100%; position: relative;
      border-radius: 50%; border: 2px solid transparent; cursor: pointer;
      overflow: hidden; transition: all 0.3s ease;
    }
    .avatar-option:hover { border-color: rgba(74, 222, 128, 0.5); }
    .avatar-option.selected { border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.4); }
    .avatar-option img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }

    @media (max-width: 900px) {
      body { flex-direction: column; justify-content: center; padding: 20px; padding-top: 100px; }
      .sidebar { 
        width: 100%; margin-left: 0; margin-bottom: 30px;
        align-items: center; text-align: center;
      }
      .sidebar.logged-in-mobile { position: fixed; top: 0; left: 0; width: 100vw; height: auto; background: var(--panel-bg); backdrop-filter: blur(20px); padding: 15px; margin: 0; border-bottom: 1px solid var(--border-color); flex-direction: row; justify-content: space-between; }
      .sidebar.logged-in-mobile .logo-container { margin: 0; }
      .sidebar.logged-in-mobile .welcome-text { margin: 0; display: flex; align-items: center; gap: 10px; text-align: left; }
      .sidebar.logged-in-mobile .welcome-text h1 { font-size: 18px; }
      .sidebar.logged-in-mobile .welcome-text p { display: none; }
      .sidebar.logged-in-mobile .dashboard-menu { display: flex; margin: 0; flex-direction: row; gap: 5px; }
      .sidebar.logged-in-mobile .dash-item { padding: 8px 12px; margin: 0; font-size: 13px; }
      .sidebar.logged-in-mobile .dash-item i { font-size: 15px; margin: 0; }
      .sidebar.logged-in-mobile .dash-item span { display: none; }
      
      .forms-wrapper { margin: 0; width: 100%; max-width: 400px; }
      .top-left-actions { top: 15px; left: 15px; }
      
      .glass-panel { padding: 25px; }
      .glass-panel.show { position: relative; }
      .glass-panel:not(.show) { display: none; }
    }
  </style>
</head>
<body>

  <div class="top-left-actions" id="topLeftActions">
    <button class="icon-btn" onclick="openPanel('settingsPanel', 'player', null)" title="Settings">
      <i class="fa-solid fa-gear"></i>
    </button>
    <button class="icon-btn" onclick="openPanel('rulesPanel', 'player', null)" title="Rules & Info">
      <i class="fa-solid fa-exclamation"></i>
    </button>
  </div>

  <div class="avatar-selector-popup" id="avatarSelector">
    <div class="avatar-selector-box">
      <div class="panel-header">
        <div>
          <h2>اختر شخصيتك</h2>
          <p>اختر أفاتار يعبر عنك.</p>
        </div>
        <i class="fa-solid fa-times" style="cursor:pointer; color:var(--text-muted);" onclick="closeAvatarSelector()"></i>
      </div>
      <div class="avatar-selector-grid" id="avatarGrid">
        </div>
      <button class="btn-main" style="margin-top: 25px;" onclick="saveSelectedAvatar()">تأكيد الاختيار</button>
    </div>
  </div>

  <div class="sidebar" id="mainSidebar">
    <div class="logo-container">
      <i class="fa-solid fa-tree"></i>
    </div>

    <div class="welcome-text" id="visitorWelcome">
      <p>Welcome</p>
      <h1>Enter the<br>locker room</h1>
    </div>

    <div class="welcome-text" id="playerWelcome" style="display: none;">
      <p>Dashboard</p>
      <div style="display:flex; align-items:center; gap: 10px;">
        <img id="sidebarAvatarDisplay" src="" style="width: 30px; height: 30px; border-radius: 50%; display:none; border: 1px solid #4ade80;">
        <h1 id="playerNameDisplay">Player</h1>
      </div>
    </div>

    <div class="menu-items" id="visitorMenu">
      <div class="menu-item active" onclick="openPanel('loginPanel',
