<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الصناديق الغامضة</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-dark: #05050a;
      --panel-bg: rgba(10, 10, 20, 0.35); 
      --primary: #00f3ff;
      --primary-glow: rgba(0, 243, 255, 0.5);
      --danger: #ff003c;
      --danger-glow: rgba(255, 0, 60, 0.5);
      --success: #00ff66;
      --warning: #ffea00;
      --text: #e0e0e0;
    }
    
    body {
      background-color: var(--bg-dark);
      background-image: linear-gradient(rgba(5, 5, 10, 0.5), rgba(15, 15, 25, 0.6)), url('bg.jpg'); 
      background-size: cover;          
      background-position: center;     
      background-attachment: fixed;    
      color: var(--text); 
      font-family: 'Cairo', sans-serif;
      text-align: center; 
      margin: 0; 
      padding: 0; 
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* تأثيرات الخلفية */
    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px; z-index: -2;
    }

    /* الحاويات الزجاجية */
    .container {
      background: var(--panel-bg); padding: 30px; border-radius: 20px; 
      max-width: 600px; margin: 40px auto; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1); 
      position: relative; z-index: 10;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h1, h2, h3 { color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.8); margin-bottom: 15px; }
    .highlight { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }
    
    /* الأزرار الخرافية */
    button {
      background: linear-gradient(135deg, rgba(0, 180, 219, 0.25), rgba(0, 131, 176, 0.45)); 
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 180, 219, 0.5); color: white; padding: 12px 20px; font-size: 16px; font-family: 'Cairo', sans-serif;
      border-radius: 12px; cursor: pointer; font-weight: 900; margin: 8px; 
      transition: all 0.3s; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--primary-glow); background: linear-gradient(135deg, rgba(0, 180, 219, 0.4), rgba(0, 131, 176, 0.6)); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-danger { background: linear-gradient(135deg, rgba(255, 0, 85, 0.25), rgba(204, 0, 68, 0.45)); border-color: rgba(255, 0, 85, 0.5); }
    .btn-success { background: linear-gradient(135deg, rgba(0, 176, 155, 0.25), rgba(150, 201, 61, 0.45)); border-color: rgba(0, 255, 102, 0.4); }
    .btn-warning { background: linear-gradient(135deg, rgba(247, 183, 51, 0.25), rgba(252, 74, 26, 0.45)); border-color: rgba(255, 234, 0, 0.5); }

    input {
      padding: 12px; font-size: 16px; font-family: 'Cairo', sans-serif; font-weight: 700;
      width: 80%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      background-color: rgba(0, 0, 0, 0.4); color: #fff; margin-bottom: 15px; text-align: center;
      backdrop-filter: blur(5px);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

    /* شريط المعلومات العلوي */
    .top-bar {
      position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 100;
      border-bottom: 1px solid rgba(0, 243, 255, 0.3); font-weight: bold; font-size: 14px;
    }

    /* سجل الأحداث */
    .log-panel {
      position: fixed; left: 10px; top: 70px; width: 250px; height: 300px;
      background: rgba(10, 10, 20, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 15px; padding: 15px; overflow-y: auto; text-align: right; font-size: 13px; z-index: 50;
    }
    .log-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log-item span { color: var(--primary); font-weight: bold; }

    /* ساحة اللعب الوسطى */
    .game-area {
      flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center;
      margin-top: 60px; padding: 20px;
    }

    .decks-container { display: flex; gap: 20px; margin-bottom: 40px; }
    .deck-card {
      width: 100px; height: 140px; background: linear-gradient(45deg, #1a1a2e, #16213e);
      border: 2px dashed rgba(0, 243, 255, 0.5); border-radius: 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; transition: 0.3s; font-weight: bold; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .deck-card:hover { transform: translateY(-10px); box-shadow: 0 15px 25px var(--primary-glow); }

    /* صناديق اللاعب */
    .player-boxes-area {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); padding: 15px 25px; border-radius: 20px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); text-align: center;
    }
    .boxes-grid { display: flex; gap: 15px; margin-top: 10px; }
    .box-item {
      width: 60px; height: 80px; background: #222; border-radius: 8px;
      border: 2px solid #444; display: flex; justify-content: center; align-items: center;
      font-size: 24px; font-weight: 900; cursor: pointer; transition: 0.3s;
      position: relative;
    }
    .box-item.empty { opacity: 0.2; cursor: not-allowed; border: 1px dashed #555; }
    .box-item:hover:not(.empty) { border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

    /* تفاعلات (ايموجي) */
    .emoji-picker {
      display: none; position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); padding: 5px; border-radius: 20px; gap: 5px;
    }
    .emoji-picker span { cursor: pointer; font-size: 20px; padding: 2px; transition: 0.2s; }
    .emoji-picker span:hover { transform: scale(1.3); }

    .opponent-area { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 20px; }
    .opponent-card { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 1px solid #333; }
    .op-boxes { display: flex; gap: 5px; margin-top: 5px; }
    .op-box { width: 30px; height: 40px; background: #222; border-radius: 4px; border: 1px solid #444; }

    /* شاشات */
    .screen { display: none; width: 100%; }
    .active-screen { display: block; }
  </style>
</head>
<body>

  <!-- شريط المعلومات -->
  <div class="top-bar" id="topBar" style="display: none;">
    <div>الجولة: <span id="roundUi" class="highlight">1</span></div>
    <div>الدور: <span id="turnUi" style="color: var(--warning);">---</span></div>
    <div>اللاعبين: <span id="playersCountUi">0</span></div>
    <button id="callBtn" class="btn-danger" style="padding: 5px 15px; margin:0; font-size:12px; display:none;">إنهاء الجولة 🛑</button>
  </div>

  <!-- سجل الأحداث -->
  <div class="log-panel" id="actionLog" style="display: none;"></div>

  <!-- شاشة الدخول -->
  <div class="container screen active-screen" id="loginScreen">
    <h1>📦 <span class="highlight">الصناديق الغامضة</span></h1>
    <p>ذاكرة قوية، خداع ذكي، وأقل مجموع يكسب!</p><br>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." maxlength="15" required>
    <hr style="border: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
    <button id="createRoomBtn">✨ إنشاء غرفة جديدة</button><br>
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة" maxlength="4" style="text-transform: uppercase; margin-top: 15px;">
    <button id="joinRoomBtn" class="btn-warning">🔗 انضمام</button>
  </div>

  <!-- اللوبي -->
  <div class="container screen" id="lobbyScreen">
    <h2>غرفة الانتظار ⏳</h2>
    <h1 id="roomCodeDisplay" style="color: var(--primary); letter-spacing: 5px;">----</h1>
    <ul id="lobbyList" style="list-style: none; padding: 0; text-align: right;"></ul>
    <div id="hostControls" style="display: none; margin-top: 20px;">
      <button id="addBotBtn" class="btn-warning" style="font-size: 14px;">🤖 إضافة بوت</button>
      <button id="startGameBtn" class="btn-success">🚀 بدء المباراة</button>
    </div>
    <p id="waitingMsg" style="display:none; color:var(--warning);">بانتظار المالك لبدء اللعبة...</p>
  </div>

  <!-- ساحة اللعب -->
  <div class="screen" id="gameScreen" style="height: 100vh;">
    <div class="game-area">
      <!-- خصومك -->
      <div class="opponent-area" id="opponentsArea"></div>

      <!-- المنتصف (السحب) -->
      <div class="decks-container">
        <div class="deck-card" id="reserveDeck">📦<br>صندوق احتياطي</div>
        <div class="deck-card" id="actionDeck" style="border-color: var(--warning); color: var(--warning);">🃏<br>بطاقة أكشن</div>
      </div>
      
      <div id="centerMessage" style="font-size: 20px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(0,255,255,0.5); height: 30px;"></div>
    </div>

    <!-- صناديق اللاعب -->
    <div class="player-boxes-area" id="myBoxesArea">
      <div style="color: #fff; font-weight: bold; margin-bottom: 5px;">صناديقي</div>
      <div class="boxes-grid" id="myBoxesGrid"></div>
      <div class="emoji-picker" id="emojiPicker">
        <span onclick="sendEmoji('😀')">😀</span>
        <span onclick="sendEmoji('😐')">😐</span>
        <span onclick="sendEmoji('🤔')">🤔</span>
        <span onclick="sendEmoji('😖')">😖</span>
      </div>
    </div>
  </div>

  <!-- شاشة النهاية -->
  <div class="container screen" id="endScreen">
    <h1 id="endTitle">نتائج الجولة 📊</h1>
    <div id="resultsList" style="text-align: right; margin-bottom: 20px;"></div>
    <button id="nextRoundBtn" class="btn-success" style="display:none;">الجولة التالية 🔄</button>
    <p id="waitNextMsg" style="display:none;">بانتظار المالك...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCu5Hbu2Rqml7_4DICZf8XyM9B4hzbpdOQ",
      authDomain: "ploska-ae755.firebaseapp.com",
      databaseURL: "https://ploska-ae755-default-rtdb.firebaseio.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // متغيرات الجلسة
    let myUid = sessionStorage.getItem('boxgame_uid');
    let currentRoom = sessionStorage.getItem('boxgame_room');
    let isOwner = false;
    let roomData = null;
    let botCounter = 1;
    
    const BOT_NAMES = ["روبوت ذكي", "المخادع", "بوت الذاكرة", "الحاسبة"];

    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
      document.getElementById(id).classList.add('active-screen');
    }

    function addLog(msg) {
      push(ref(db, `rooms/${currentRoom}/log`), { text: msg, time: Date.now() });
    }

    async function joinRoom(name, code, asOwner) {
      currentRoom = code;
      isOwner = asOwner;
      
      if (!myUid || asOwner || document.getElementById('playerName').value !== "") {
         let newRef = push(ref(db, `rooms/${code}/players`));
         myUid = newRef.key;
         await set(newRef, { name: name, isOwner: asOwner, isBot: false, score: 0 });
         sessionStorage.setItem('boxgame_uid', myUid);
         sessionStorage.setItem('boxgame_room', code);
         onDisconnect(newRef).remove();
      }

      onValue(ref(db, `rooms/${code}`), (snapshot) => {
        const data = snapshot.val();
        if (!data) return location.reload();
        roomData = data;
        isOwner = data.players[myUid]?.isOwner || false;
        renderState(data);
      });
    }

    function renderState(data) {
      const status = data.status;
      const me = data.players[myUid];
      if (!me) return;

      // شريط اللوج
      if(data.log) {
        const logPanel = document.getElementById('actionLog');
        logPanel.innerHTML = '';
        Object.values(data.log).sort((a,b)=>a.time-b.time).slice(-15).forEach(l => {
          logPanel.innerHTML += `<div class="log-item">${l.text}</div>`;
        });
        logPanel.scrollTop = logPanel.scrollHeight;
      }

      if (status === 'waiting') {
        switchScreen('lobbyScreen');
        document.getElementById('topBar').style.display = 'none';
        document.getElementById('actionLog').style.display = 'none';
        document.getElementById('roomCodeDisplay').innerText = currentRoom;
        
        let list = '';
        for (let k in data.players) {
          let p = data.players[k];
          list += `<li style="padding:10px; background:rgba(0,0,0,0.3); margin:5px; border-radius:5px; color:#fff;">
            ${p.name} ${p.isOwner ? '👑' : ''} ${p.isBot ? '🤖' : ''}
          </li>`;
        }
        document.getElementById('lobbyList').innerHTML = list;

        document.getElementById('hostControls').style.display = isOwner ? 'block' : 'none';
        document.getElementById('waitingMsg').style.display = isOwner ? 'none' : 'block';
      } 
      else if (status === 'init_peek' || status === 'playing') {
        switchScreen('gameScreen');
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('actionLog').style.display = 'block';
        
        // بناء الخصوم
        const oppArea = document.getElementById('opponentsArea');
        oppArea.innerHTML = '';
        for (let k in data.players) {
          if (k === myUid) continue;
          let p = data.players[k];
          let pDiv = document.createElement('div');
          pDiv.className = 'opponent-card';
          pDiv.innerHTML = `<div style="color:#fff; font-size:12px;">${p.name}</div><div class="op-boxes">
            ${p.boxes.map(b => `<div class="op-box ${b.deleted ? 'empty' : ''}"></div>`).join('')}
          </div>`;
          oppArea.appendChild(pDiv);
        }

        // بناء صناديقي
        const myGrid = document.getElementById('myBoxesGrid');
        myGrid.innerHTML = '';
        me.boxes.forEach((box, i) => {
          let bDiv = document.createElement('div');
          bDiv.className = `box-item ${box.deleted ? 'empty' : ''}`;
          bDiv.innerText = box.revealed ? box.value : '📦';
          bDiv.onclick = () => handleBoxClick(i);
          myGrid.appendChild(bDiv);
        });

        // معلومات البار
        document.getElementById('roundUi').innerText = data.round || 1;
        document.getElementById('playersCountUi').innerText = Object.keys(data.players).length;
        
        if (data.currentTurn) {
          let turnName = data.players[data.currentTurn].name;
          document.getElementById('turnUi').innerText = turnName;
          
          if (data.currentTurn === myUid && status === 'playing') {
            document.getElementById('callBtn').style.display = 'block';
            document.getElementById('centerMessage').innerText = 'دورك! اختر سحب صندوق أو بطاقة.';
          } else {
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('centerMessage').innerText = status === 'init_peek' ? 'اكشف صندوقين للبدء...' : `انتظر دور ${turnName}...`;
          }
        }

        // تحكم البوتات للمالك
        if (isOwner && data.players[data.currentTurn]?.isBot && status === 'playing') {
           handleBotTurn(data.currentTurn);
        }
      }
      else if (status === 'ended') {
        switchScreen('endScreen');
        document.getElementById('topBar').style.display = 'none';
        
        let resHtml = '';
        let sorted = Object.values(data.players).map(p => {
           let sum = p.boxes.filter(b=>!b.deleted).reduce((acc, b) => acc + b.value, 0);
           return { ...p, roundSum: sum };
        }).sort((a,b)=> a.roundSum - b.roundSum);

        sorted.forEach((p, i) => {
          resHtml += `<div style="background:rgba(0,0,0,0.4); padding:10px; margin:10px 0; border-radius:10px; color:#fff;">
            <b>${i+1}. ${p.name}</b> - المجموع: <span class="highlight">${p.roundSum}</span>
            <div style="font-size:12px; color:#aaa; margin-top:5px;">الصناديق: ${p.boxes.filter(b=>!b.deleted).map(b=>b.value).join(', ')}</div>
          </div>`;
        });
        document.getElementById('resultsList').innerHTML = resHtml;

        document.getElementById('nextRoundBtn').style.display = isOwner ? 'block' : 'none';
        document.getElementById('waitNextMsg').style.display = isOwner ? 'none' : 'block';
      }
    }

    // -- أحداث الواجهة الأساسية --
    document.getElementById('createRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim();
      if(!name) return;
      const code = Math.random().toString(36).substr(2, 4).toUpperCase();
      set(ref(db, `rooms/${code}`), { status: 'waiting', log: {}, round: 1 });
      joinRoom(name, code, true);
    };

    document.getElementById('joinRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim();
      const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if(!name || code.length < 4) return;
      joinRoom(name, code, false);
    };

    document.getElementById('addBotBtn').onclick = () => {
      let bName = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] + ` ${botCounter++}`;
      push(ref(db, `rooms/${currentRoom}/players`), { name: bName, isOwner: false, isBot: true, score: 0 });
    };

    document.getElementById('startGameBtn').onclick = async () => {
      startNewRound(1);
    };

    document.getElementById('nextRoundBtn').onclick = async () => {
      startNewRound(roomData.round + 1);
    };

    async function startNewRound(roundNum) {
      let updates = {};
      updates[`rooms/${currentRoom}/status`] = 'init_peek';
      updates[`rooms/${currentRoom}/round`] = roundNum;
      updates[`rooms/${currentRoom}/calledBy`] = null;
      
      let pKeys = Object.keys(roomData.players);
      updates[`rooms/${currentRoom}/turnOrder`] = pKeys.sort(() => Math.random() - 0.5);
      updates[`rooms/${currentRoom}/currentTurn`] = pKeys[0];
      
      pKeys.forEach(k => {
        let boxes = [];
        for(let i=0; i<4; i++) boxes.push({ value: Math.floor(Math.random() * 14), deleted: false, revealed: false });
        updates[`rooms/${currentRoom}/players/${k}/boxes`] = boxes;
        updates[`rooms/${currentRoom}/players/${k}/peekCount`] = 0;
      });

      updates[`rooms/${currentRoom}/log`] = null;
      await update(ref(db), updates);
      addLog('🚀 بدأت الجولة! اكشف صندوقين لمعرفة أرقامك.');
    }

    // التعامل مع ضغط اللاعب على صناديقه
    async function handleBoxClick(idx) {
      if (roomData.status === 'init_peek') {
        const me = roomData.players[myUid];
        if (me.peekCount < 2 && !me.boxes[idx].revealed) {
          await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { revealed: true });
          await update(ref(db, `rooms/${currentRoom}/players/${myUid}`), { peekCount: me.peekCount + 1 });
          
          // هل الكل خلص؟
          if (isOwner) checkAllPeeked();
        }
      }
      else if (roomData.status === 'playing' && roomData.currentTurn === myUid && roomData.actionState === 'replace_box') {
        // استبدال صندوق بصندوق السحب
        let newVal = roomData.drawnBoxValue;
        let oldVal = roomData.players[myUid].boxes[idx].value;
        await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { value: newVal, revealed: true });
        await update(ref(db, `rooms/${currentRoom}/actionState`), null);
        addLog(`<span>${roomData.players[myUid].name}</span> استبدل صندوق برقم جديد.`);
        
        setTimeout(() => nextTurn(), 1500);
      }
    }

    async function checkAllPeeked() {
      let allReady = true;
      for (let k in roomData.players) {
        if (!roomData.players[k].isBot && roomData.players[k].peekCount < 2) allReady = false;
      }
      if (allReady) {
        // إخفاء الصناديق وبدء اللعب
        let updates = { [`rooms/${currentRoom}/status`]: 'playing' };
        for (let k in roomData.players) {
           for(let i=0; i<4; i++) updates[`rooms/${currentRoom}/players/${k}/boxes/${i}/revealed`] = false;
        }
        await update(ref(db), updates);
        addLog('🎲 انتهت فترة الحفظ، بدأ اللعب!');
      }
    }

    // سحب صندوق احتياطي
    document.getElementById('reserveDeck').onclick = async () => {
      if (roomData.status !== 'playing' || roomData.currentTurn !== myUid || roomData.actionState) return;
      let val = Math.floor(Math.random() * 14);
      await update(ref(db, `rooms/${currentRoom}`), { actionState: 'replace_box', drawnBoxValue: val });
      document.getElementById('centerMessage').innerText = `سحبت الرقم (${val}). اختر صندوق من صناديقك لاستبداله!`;
    };

    // سحب بطاقة أكشن (تبسيط للحجم: بطاقة كشف عشوائية أو حذف)
    document.getElementById('actionDeck').onclick = async () => {
      if (roomData.status !== 'playing' || roomData.currentTurn !== myUid || roomData.actionState) return;
      let actions = ['peek_self', 'delete_self'];
      let act = actions[Math.floor(Math.random() * actions.length)];
      
      if (act === 'peek_self') {
        document.getElementById('centerMessage').innerText = `بطاقة كشف: اضغط على صندوقك لتتذكره.`;
        // منطق مبسط: نكتشف صندوق عشوائي ونخفيه بعد ثانيتين
        let myBoxes = roomData.players[myUid].boxes;
        let validIds = [0,1,2,3].filter(i => !myBoxes[i].deleted);
        let rId = validIds[Math.floor(Math.random() * validIds.length)];
        
        await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${rId}`), { revealed: true });
        addLog(`<span>${roomData.players[myUid].name}</span> استخدم بطاقة كشف صندوق.`);
        
        setTimeout(async () => {
          await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${rId}`), { revealed: false });
          nextTurn();
        }, 2000);
      } else {
        // حذف صندوق
        let myBoxes = roomData.players[myUid].boxes;
        let validIds = [0,1,2,3].filter(i => !myBoxes[i].deleted);
        if(validIds.length > 1) {
          let rId = validIds[Math.floor(Math.random() * validIds.length)];
          await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${rId}`), { deleted: true });
          addLog(`<span>${roomData.players[myUid].name}</span> استخدم بطاقة حذف وتخلص من صندوق!`);
        }
        setTimeout(() => nextTurn(), 1500);
      }
    };

    // إنهاء الجولة
    document.getElementById('callBtn').onclick = async () => {
      await update(ref(db, `rooms/${currentRoom}`), { calledBy: myUid });
      addLog(`🚨 <span>${roomData.players[myUid].name}</span> قام بتفعيل إنهاء الجولة! دور أخير للجميع.`);
      nextTurn();
    };

    async function nextTurn() {
      let order = roomData.turnOrder;
      let currIdx = order.indexOf(roomData.currentTurn);
      let nextIdx = (currIdx + 1) % order.length;
      let nextUid = order[nextIdx];

      if (roomData.calledBy === nextUid) {
         // انتهت الجولة
         await update(ref(db, `rooms/${currentRoom}/status`), 'ended');
         addLog('🏁 انتهت الجولة! جاري حساب النقاط...');
      } else {
         await update(ref(db, `rooms/${currentRoom}/currentTurn`), nextUid);
      }
    }

    // --- منطق البوت المبسط (يُنفذ من جهاز المالك) ---
    let botTimeout = null;
    function handleBotTurn(botUid) {
      clearTimeout(botTimeout);
      botTimeout = setTimeout(async () => {
        if(roomData.status !== 'playing' || roomData.currentTurn !== botUid) return;
        
        let p = roomData.players[botUid];
        let validIds = [0,1,2,3].filter(i => !p.boxes[i].deleted);
        
        // قرار البوت: 50% سحب صندوق، 50% كشف
        if (Math.random() > 0.5) {
           // سحب واستبدال
           let newVal = Math.floor(Math.random() * 14);
           let replaceId = validIds[Math.floor(Math.random() * validIds.length)];
           await update(ref(db, `rooms/${currentRoom}/players/${botUid}/boxes/${replaceId}`), { value: newVal });
           addLog(`<span>${p.name} (بوت)</span> سحب صندوق احتياطي وبدّل أحد صناديقه.`);
        } else {
           // كشف
           addLog(`<span>${p.name} (بوت)</span> استخدم بطاقة كشف وتفقد أحد صناديقه.`);
        }
        
        // هل ينهي الجولة؟
        let currentSum = p.boxes.filter(b=>!b.deleted).reduce((a,b)=>a+b.value, 0);
        if (currentSum < 15 && !roomData.calledBy && Math.random() > 0.7) {
           await update(ref(db, `rooms/${currentRoom}`), { calledBy: botUid });
           addLog(`🚨 <span>${p.name} (بوت)</span> أنهى الجولة! دور أخير للجميع.`);
        }
        
        setTimeout(() => { if (isOwner && roomData.currentTurn === botUid) nextTurn(); }, 1500);

      }, 2500); // مهلة تفكير البوت
    }

    // ابتسامات الخداع
    window.sendEmoji = function(emoji) {
      addLog(`تفاعل <span>${roomData.players[myUid].name}</span>: ${emoji}`);
    };

  </script>
</body>
</html>
