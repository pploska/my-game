<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      /* 
         تمت إضافة 3 طبقات للخلفية:
         1. طبقة دائرية سوداء في الزاوية اليمين بالأسفل (لإخفاء شعار جيمني تماماً).
         2. طبقة تعتيم على الأطراف اليمين واليسار لإبراز القوائم.
         3. صورتك الأصلية.
      */
      background-image: 
        radial-gradient(circle at 100% 100%, #050505 0%, #050505 5%, transparent 15%),
        linear-gradient(to right, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.6) 100%), 
        url('bg.jpg');
      
      /* حل مشكلة الزووم: 
         هذا الإعداد يضمن إن الصورة تظهر أبعد وتغطي الشاشة بشكل ممتاز 
         بدون ما تقص أجزاء مهمة من فوق أو تحت 
      */
      background-size: cover;
      background-position: top center;
      background-repeat: no-repeat;
      background-color: #050505; 
      
      font-family: 'Segoe UI', 'Cairo', sans-serif;
      display: flex;
      align-items: center; 
      justify-content: space-between;
      overflow: hidden;
      color: #fff;
    }

    /* ========================================= */
    /* القائمة الجانبية (يسار الشاشة) */
    /* ========================================= */
    .menu-container {
      margin-left: 8%; 
      display: flex;
      flex-direction: column;
      gap: 20px; 
      z-index: 10;
    }

    .menu-item {
      font-size: 35px;
      font-weight: 700;
      color: #666;
      cursor: pointer;
      position: relative;
      display: inline-block;
      width: fit-content;
      transition: color 0.3s ease, transform 0.3s ease;
      letter-spacing: 1px;
    }

    .menu-item::after {
      content: '';
      position: absolute;
      bottom: -5px;
      left: 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, rgba(144, 238, 144, 0.2) 0%, rgba(144, 238, 144, 1) 50%, rgba(144, 238, 144, 0.2) 100%);
      box-shadow: 0 0 12px 2px rgba(144, 238, 144, 0.6);
      border-radius: 50%;
      opacity: 0; 
      transform: scaleX(0.3); 
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .menu-item:hover, .menu-item.active {
      color: #ffffff; 
      transform: translateX(10px); 
    }

    .menu-item:hover::after, .menu-item.active::after {
      opacity: 1; 
      transform: scaleX(1); 
    }

    /* ========================================= */
    /* حاوية تسجيل الدخول (يمين الشاشة) */
    /* ========================================= */
    .login-form-container {
      margin-right: 10%;
      background: rgba(10, 10, 15, 0.4);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 40px;
      border-radius: 20px;
      width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(144, 238, 144, 0.05);
      
      opacity: 0;
      visibility: hidden;
      transform: translateX(50px);
      transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
      
      direction: rtl;
      text-align: right;
    }

    .login-form-container.show {
      opacity: 1;
      visibility: visible;
      transform: translateX(0);
    }

    .login-form-container h2 {
      font-family: 'Cairo', sans-serif;
      font-size: 28px;
      margin-bottom: 30px;
      color: #fff;
      font-weight: 900;
    }
    .login-form-container h2 span {
      color: #90ee90;
      text-shadow: 0 0 15px rgba(144, 238, 144, 0.5);
    }

    input {
      width: 100%;
      padding: 15px 20px;
      margin-bottom: 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(0, 0, 0, 0.5);
      color: #fff;
      font-family: 'Cairo', sans-serif;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
    }
    input:focus {
      outline: none;
      border-color: #90ee90;
      box-shadow: 0 0 15px rgba(144, 238, 144, 0.3);
      background: rgba(0, 0, 0, 0.7);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      font-family: 'Cairo', sans-serif;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    
    .btn-create {
      background: linear-gradient(135deg, rgba(144, 238, 144, 0.2), rgba(34, 139, 34, 0.5));
      color: #fff;
      border: 1px solid rgba(144, 238, 144, 0.5);
    }
    .btn-create:hover {
      background: linear-gradient(135deg, rgba(144, 238, 144, 0.4), rgba(34, 139, 34, 0.7));
      box-shadow: 0 5px 20px rgba(144, 238, 144, 0.4);
      transform: translateY(-2px);
    }

    .btn-join {
      background: rgba(255, 255, 255, 0.05);
      color: #ccc;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }
    .btn-join:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      border-color: #fff;
      transform: translateY(-2px);
    }

  </style>
</head>
<body>

  <!-- القائمة الجانبية -->
  <div class="menu-container">
    <div class="menu-item" id="loginMenuBtn">Login</div>
    <div class="menu-item" id="signupMenuBtn">Sign up</div>
  </div>

  <!-- حاوية تسجيل الدخول المخفية -->
  <div class="login-form-container" id="loginForm">
    <h2>تسجيل <span>الدخول</span></h2>
    
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." autocomplete="off">
    <input type="text" id="roomCode" placeholder="كود الغرفة (للانضمام)" style="text-transform: uppercase;" autocomplete="off">
    
    <div class="btn-group">
      <button class="btn-create" id="createBtn">إنشاء غرفة</button>
      <button class="btn-join" id="joinBtn">انضمام</button>
    </div>
  </div>

  <script>
    const loginMenuBtn = document.getElementById('loginMenuBtn');
    const signupMenuBtn = document.getElementById('signupMenuBtn');
    const loginForm = document.getElementById('loginForm');

    loginMenuBtn.addEventListener('click', () => {
      loginMenuBtn.classList.add('active');
      signupMenuBtn.classList.remove('active');
      loginForm.classList.add('show');
    });

    signupMenuBtn.addEventListener('click', () => {
      signupMenuBtn.classList.add('active');
      loginMenuBtn.classList.remove('active');
      loginForm.classList.remove('show');
    });
  </script>

</body>
</html>
