<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Locker Room - Saudi Team</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg-color: #050505;
      --panel-bg: #0a0a0a;
      --gold: #c5a059;
      --gold-muted: rgba(197, 160, 89, 0.4);
      --text-main: #ffffff;
      --text-muted: #888888;
      --border-color: #222222;
      --input-bg: #0d0d0d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw; 
      min-height: 100vh;
      background-image: 
        linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.9) 100%), 
        url('bg.jpg'); /* ضع خلفيتك هنا */
      background-size: cover; 
      background-position: center; 
      background-color: var(--bg-color);
      background-attachment: fixed;
      font-family: 'Inter', sans-serif;
      display: flex; 
      align-items: center; 
      justify-content: center;
      color: var(--text-main); 
    }

    /* ========================================= */
    /* الحاوية الرئيسية والتصميم الذهبي */
    /* ========================================= */
    .forms-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
    }

    .glass-panel {
      background: var(--panel-bg);
      border: 1px solid var(--gold-muted);
      border-radius: 20px;
      padding: 40px 25px;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      position: relative;
    }
    
    /* إضافة لمسة الزوايا العلوية */
    .glass-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .glass-panel.show { display: block; animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ========================================= */
    /* النصوص العلوية */
    /* ========================================= */
    .panel-header { text-align: center; margin-bottom: 30px; }
    .panel-header h2 { 
      font-family: 'Playfair Display', serif; 
      font-size: 32px; 
      color: var(--gold); 
      font-weight: 500; 
      margin-bottom: 8px; 
      letter-spacing: 0.5px;
    }
    .panel-header p { color: var(--text-muted); font-size: 14px; }

    /* ========================================= */
    /* شريط الخطوات (Steps) */
    /* ========================================= */
    .stepper { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 35px; }
    .step { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); }
    .step.active { color: var(--gold); }
    
    .step-circle { 
      width: 22px; height: 22px; 
      border-radius: 50%; 
      border: 1px solid var(--text-muted); 
      display: flex; align-items: center; justify-content: center; 
      font-size: 11px; transition: all 0.3s;
    }
    .step.active .step-circle { border-color: var(--gold); background: rgba(197, 160, 89, 0.1); color: var(--gold); }
    
    .step-line { height: 1px; width: 30px; background: var(--border-color); }

    /* ========================================= */
    /* الأفاتارات (Avatars) */
    /* ========================================= */
    .avatars-section { margin-bottom: 30px; }
    .avatars-section h3 { font-size: 14px; color: #ccc; margin-bottom: 15px; font-weight: 400; }
    
    .avatars-row { display: flex; justify-content: space-between; gap: 10px; }
    .avatar-box { 
      position: relative; width: 55px; height: 55px; 
      border-radius: 50%; border: 1px solid var(--border-color); 
      cursor: pointer; transition: all 0.3s;
    }
    .avatar-box img { 
      width: 100%; height: 100%; border-radius: 50%; 
      object-fit: cover; filter: brightness(0.4) grayscale(100%); transition: all 0.3s;
    }
    
    .avatar-box.selected { border-color: var(--gold); box-shadow: 0 0 15px rgba(197, 160, 89, 0.15); }
    .avatar-box.selected img { filter: brightness(1) grayscale(0%); }
    
    .avatar-check { 
      position: absolute; bottom: -2px; right: -2px; 
      background: var(--gold); color: #000; 
      width: 18px; height: 18px; border-radius: 50%; 
      display: none; align-items: center; justify-content: center; 
      font-size: 10px; border: 2px solid var(--panel-bg);
    }
    .avatar-box.selected .avatar-check { display: flex; }

    /* ========================================= */
    /* حقول الإدخال (Inputs) */
    /* ========================================= */
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-size: 13px; color: #ccc; margin-bottom: 8px; font-weight: 400; }
    
    .input-box { 
      display: flex; align-items: center; 
      background: var(--input-bg); 
      border: 1px solid var(--border-color); 
      border-radius: 12px; padding: 0 15px; 
      height: 52px; transition: all 0.3s;
    }
    .input-box:focus-within { border-color: var(--gold-muted); box-shadow: 0 0 10px rgba(197, 160, 89, 0.05); }
    
    .input-box i { color: var(--text-muted); font-size: 16px; margin-right: 12px; width: 20px; text-align: center; }
    
    .input-box input { 
      flex: 1; background: transparent; border: none; 
      color: var(--text-main); font-family: 'Inter', sans-serif; 
      font-size: 14px; outline: none; width: 100%;
    }
    .input-box input::placeholder { color: #555; }
    
    .eye-icon { cursor: pointer; color: var(--gold) !important; opacity: 0.7; }
    .eye-icon:hover { opacity: 1; }

    /* الحقول المزدوجة (للقميص) */
    .split-row { display: flex; gap: 15px; }
    .split-row .input-group { flex: 1; }

    /* ========================================= */
    /* الأزرار والنصوص السفلية */
    /* ========================================= */
    .submit-btn { 
      width: 100%; height: 52px; 
      background: linear-gradient(180deg, rgba(30,30,30,1) 0%, rgba(10,10,10,1) 100%); 
      border: 1px solid var(--gold-muted); border-radius: 12px; 
      color: var(--gold); font-size: 18px; 
      font-family: 'Playfair Display', serif; font-weight: 500;
      cursor: pointer; margin-top: 10px; transition: all 0.3s;
    }
    .submit-btn:hover { background: rgba(197, 160, 89, 0.1); border-color: var(--gold); }

    .bottom-text { text-align: center; margin-top: 25px; font-size: 13px; color: var(--text-muted); }
    .bottom-text span { color: var(--gold); cursor: pointer; font-weight: 500; transition: 0.3s; }
    .bottom-text span:hover { text-shadow: 0 0 8px rgba(197, 160, 89, 0.5); }

    /* واجهة البروفايل والرئيسية للتحكم */
    .logout-btn { position: absolute; top: 20px; right: 20px; color: #ff4d6d; background: transparent; border: none; font-size: 18px; cursor: pointer; }
    
    @media (max-width: 400px) {
      .avatars-row { overflow-x: auto; padding-bottom: 5px; }
      .avatar-box { flex-shrink: 0; }
    }
  </style>
</head>
<body>

  <div class="forms-wrapper">
    
    <div class="glass-panel show" id="signupPanel">
      <div class="panel-header">
        <h2>Sign up</h2>
        <p>Create your account</p>
      </div>

      <div class="stepper">
        <div class="step active"><div class="step-circle">1</div> Avatar</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-circle">2</div> Information</div>
        <div class="step-line"></div>
        <div class="step"><div class="step-circle">3</div> Confirm</div>
      </div>

      <div class="avatars-section">
        <h3>Choose your avatar</h3>
        <div class="avatars-row" id="signupAvatars">
          </div>
      </div>

      <div class="input-group">
        <label>Username</label>
        <div class="input-box">
          <i class="fa-regular fa-user"></i>
          <input type="text" id="regName" placeholder="Enter your username">
        </div>
      </div>
      
      <div class="input-group">
        <label>Email</label>
        <div class="input-box">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="regEmail" placeholder="Enter your email">
        </div>
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="regPass" placeholder="Enter your password">
          <i class="fa-regular fa-eye eye-icon" onclick="togglePass('regPass')"></i>
        </div>
      </div>

      <div class="split-row">
        <div class="input-group">
          <label>Jersey Name</label>
          <div class="input-box">
            <i class="fa-solid fa-shirt"></i>
            <input type="text" id="regJerseyName" placeholder="Name" maxlength="12">
          </div>
        </div>
        <div class="input-group">
          <label>Number</label>
          <div class="input-box">
            <i class="fa-solid fa-hashtag"></i>
            <input type="number" id="regJerseyNum" placeholder="10" min="1" max="99">
          </div>
        </div>
      </div>

      <button class="submit-btn" id="signupBtn">Next</button>

      <div class="bottom-text">
        Already have an account? <span onclick="switchPanel('loginPanel')">Login</span>
      </div>
    </div>

    <div class="glass-panel" id="loginPanel">
      <div class="panel-header">
        <h2>Login</h2>
        <p>Access your account</p>
      </div>

      <div class="input-group" style="margin-top: 40px;">
        <label>Email</label>
        <div class="input-box">
          <i class="fa-regular fa-envelope"></i>
          <input type="email" id="loginEmail" placeholder="Enter your email">
        </div>
      </div>
      
      <div class="input-group">
        <label>Password</label>
        <div class="input-box">
          <i class="fa-solid fa-lock"></i>
          <input type="password" id="loginPass" placeholder="Enter your password">
          <i class="fa-regular fa-eye eye-icon" onclick="togglePass('loginPass')"></i>
        </div>
      </div>

      <button class="submit-btn" id="loginBtn" style="margin-top: 30px;">Login</button>

      <div class="bottom-text">
        Don't have an account? <span onclick="switchPanel('signupPanel')">Sign up</span>
      </div>
    </div>

    <div class="glass-panel" id="homePanel">
      <button class="logout-btn" onclick="logoutUser()" title="Logout"><i class="fa-solid fa-arrow-right-from-bracket"></i></button>
      <div class="panel-header" style="margin-top: 20px;">
        <h2 id="playerNameDisplay">Player</h2>
        <p id="playerJerseyDisplay" style="margin-bottom: 20px;">#10</p>
        <img id="playerAvatarDisplay" src="" style="width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; margin-bottom: 20px;">
      </div>
      <button class="submit-btn">Start Game</button>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <script>
    // روابط الأفاتارات الخاصة بك
    const avatars = [
      "https://cdn.pfps.gg/pfps/5024-dark-aesthetic-anime-profile-avatar.png",
      "https://i.pinimg.com/736x/35/cd/4d/35cd4dd145c0aaa1027b37d3c910ace3.jpg",
      "https://i.pinimg.com/736x/b8/6d/61/b86d610fbc909254943f3a262dd400b9.jpg",
      "https://i.pinimg.com/736x/f7/4d/9c/f74d9c7191428e3a01f8a63739862c44.jpg",
      "https://i.pinimg.com/736x/22/09/7a/22097abef6a3ebdae64e4811e931fece.jpg"
    ];

    let selectedAvatarUrl = avatars[0];

    // عرض الأفاتارات بنفس شكل الصورة
    const avatarContainer = document.getElementById('signupAvatars');
    avatars.forEach((url, index) => {
      const div = document.createElement('div');
      div.className = `avatar-box ${index === 2 ? 'selected' : ''}`; // الخيار الثالث مفعل افتراضياً كالصورة
      if(index === 2) selectedAvatarUrl = url;
      
      div.innerHTML = `
        <img src="${url}" alt="Avatar">
        <div class="avatar-check"><i class="fa-solid fa-check"></i></div>
      `;
      div.onclick = () => {
        document.querySelectorAll('.avatar-box').forEach(el => el.classList.remove('selected'));
        div.classList.add('selected');
        selectedAvatarUrl = url;
      };
      avatarContainer.appendChild(div);
    });

    // التنقل بين النوافذ
    function switchPanel(panelId) {
      document.querySelectorAll('.glass-panel').forEach(p => p.classList.remove('show'));
      document.getElementById(panelId).classList.add('show');
    }

    // إظهار/إخفاء الرقم السري
    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    }
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCuSHbu2RqMl7-4DICZf8XyM9B4hzbpdOQ",
      authDomain: "ploska-ae755.firebaseapp.com",
      databaseURL: "https://ploska-ae755-default-rtdb.firebaseio.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // إنشاء الحساب
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPass').value;
      const username = document.getElementById('regName').value;
      const jerseyName = document.getElementById('regJerseyName').value;
      const jerseyNum = document.getElementById('regJerseyNum').value;

      if(!email || !pass || !username) {
        Swal.fire({ background: '#0a0a0a', color: '#c5a059', icon: 'warning', text: 'Please fill username, email, and password.' });
        return;
      }

      try {
        Swal.fire({ background: '#0a0a0a', color: '#c5a059', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;

        const dbPromise = setDoc(doc(db, "users", user.uid), {
          username: username,
          email: email,
          jerseyName: jerseyName || username,
          jerseyNumber: jerseyNum || "10",
          avatarUrl: selectedAvatarUrl,
          createdAt: new Date()
        }, { merge: true });

        const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 10000));
        await Promise.race([dbPromise, timeoutPromise]);

        Swal.fire({ background: '#0a0a0a', color: '#c5a059', icon: 'success', text: 'Account created successfully.' });
      } catch (error) {
        Swal.fire({ background: '#0a0a0a', color: '#ff4d6d', icon: 'error', text: error.message });
      }
    });

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      if(!email || !pass) return;

      try {
        Swal.fire({ background: '#0a0a0a', color: '#c5a059', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
        await signInWithEmailAndPassword(auth, email, pass);
        Swal.close();
      } catch (error) {
        Swal.fire({ background: '#0a0a0a', color: '#ff4d6d', icon: 'error', text: 'Invalid email or password.' });
      }
    });

    window.logoutUser = async () => {
      await signOut(auth);
      window.location.reload(); 
    };

    // متابعة حالة الدخول
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        let username = "Player", jerseyName = "Player", jerseyNum = "10", avatar = avatars[0];
        try {
          const docSnap = await getDoc(doc(db, "users", user.uid));
          if (docSnap.exists()) {
            const data = docSnap.data();
            username = data.username || username;
            jerseyName = data.jerseyName || jerseyName;
            jerseyNum = data.jerseyNumber || jerseyNum;
            if(data.avatarUrl) avatar = data.avatarUrl;
          }
        } catch(e) {}
        
        switchPanel('homePanel');
        
        document.getElementById('playerNameDisplay').innerText = username;
        document.getElementById('playerJerseyDisplay').innerText = `${jerseyName} #${jerseyNum}`;
        document.getElementById('playerAvatarDisplay').src = avatar;
      }
    });
  </script>

</body>
</html>
