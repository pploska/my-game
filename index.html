<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCuSHbu2RqMl7-4DICZf8XyM9B4hzbpdOQ", authDomain: "ploska-ae755.firebaseapp.com", projectId: "ploska-ae755", storageBucket: "ploska-ae755.firebasestorage.app", messagingSenderId: "115680839911", appId: "1:115680839911:web:1220fea64c03c3a9137a42" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const avatarList = [
      { id: 'av_1', url: 'https://cdn.pfps.gg/pfps/5024-dark-aesthetic-anime-profile-avatar.png' },
      { id: 'av_2', url: 'https://i.pinimg.com/736x/35/cd/4d/35cd4dd145c0aaa1027b37d3c910ace3.jpg' },
      { id: 'av_3', url: 'https://i.pinimg.com/736x/b8/6d/61/b86d610fbc909254943f3a262dd400b9.jpg' },
      { id: 'av_4', url: 'https://i.pinimg.com/736x/f7/4d/9c/f74d9c7191428e3a01f8a63739862c44.jpg' },
      { id: 'av_5', url: 'https://i.pinimg.com/736x/22/09/7a/22097abef6a3ebdae64e4811e931fece.jpg' },
      { id: 'av_6', url: 'https://api.dicebear.com/7.x/bottts/svg?seed=6&backgroundColor=4ade80' },
      { id: 'av_7', url: 'https://api.dicebear.com/7.x/bottts/svg?seed=7&backgroundColor=4ade80' },
      { id: 'av_8', url: 'https://api.dicebear.com/7.x/bottts/svg?seed=8&backgroundColor=4ade80' }
    ];
    const defaultAvatar = avatarList[0].url;
    let tempSelectedAvatarUrl = null;

    const avatarGrid = document.getElementById('avatarGrid');
    avatarList.forEach(av => {
      const option = document.createElement('div'); option.className = 'avatar-option';
      option.onclick = () => selectAvatarOption(av.url, option);
      option.innerHTML = `<img src="${av.url}" alt="Avatar">`;
      avatarGrid.appendChild(option);
    });

    window.openAvatarSelector = () => { document.getElementById('avatarSelector').classList.add('show'); };
    window.closeAvatarSelector = () => { document.getElementById('avatarSelector').classList.remove('show'); };

    function selectAvatarOption(url, element) {
      document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
      element.classList.add('selected'); tempSelectedAvatarUrl = url;
    }

    window.saveSelectedAvatar = () => {
      if(tempSelectedAvatarUrl) {
        document.getElementById('profileAvatarDisplay').src = tempSelectedAvatarUrl; closeAvatarSelector();
      }
    };

    // --- دالة مساعدة لقطع التحميل إذا طال عن 8 ثوانٍ ---
    const timeoutPromise = new Promise((_, reject) => 
      setTimeout(() => reject(new Error("انتهى وقت الاتصال! يرجى التأكد من تفعيل قاعدة بيانات Firestore في لوحة تحكم Firebase.")), 8000)
    );

    // تسجيل حساب جديد
    document.getElementById('signupBtn').addEventListener('click', async () => {
      const email = document.getElementById('regEmail').value;
      const pass = document.getElementById('regPass').value;
      const username = document.getElementById('regName').value;
      const jerseyName = document.getElementById('regJerseyName').value;
      const jerseyNum = document.getElementById('regJerseyNum').value;

      if(!email || !pass || !username) { Swal.fire({ background: '#111', color: '#fff', icon: 'error', text: 'الرجاء تعبئة الحقول.' }); return; }

      Swal.fire({ title: 'جاري الإنشاء...', background: '#111', color: '#fff', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
      
      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
        const user = userCredential.user;
        
        // استخدام Promise.race لمنع التعليق
        await Promise.race([
          setDoc(doc(db, "users", user.uid), { username: username, email: email, avatarUrl: defaultAvatar, jerseyName: jerseyName || username, jerseyNumber: jerseyNum, createdAt: new Date(), answeredQuestions: [] }),
          timeoutPromise
        ]);
        
        Swal.close(); 
        Swal.fire({ background: '#111', color: '#fff', icon: 'success', text: 'تم إنشاء الحساب بنجاح.' });
      } catch (error) { 
        Swal.close(); 
        Swal.fire({ background: '#111', color: '#fff', icon: 'error', text: error.message }); 
      }
    });

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('loginEmail').value;
      const pass = document.getElementById('loginPass').value;
      if(!email || !pass) return;

      Swal.fire({ title: 'جاري الدخول...', background: '#111', color: '#fff', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
      
      try { 
        await Promise.race([
          signInWithEmailAndPassword(auth, email, pass),
          timeoutPromise
        ]); 
        Swal.close();
      } catch (error) { 
        Swal.close();
        Swal.fire({ background: '#111', color: '#fff', icon: 'error', text: error.message }); 
      }
    });

    window.logoutUser = async () => { await signOut(auth); window.location.reload(); };

    // تعديل البروفايل
    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const user = auth.currentUser; if(!user) return;
      const newUsername = document.getElementById('profileUsername').value;
      const newAvatarUrl = document.getElementById('profileAvatarDisplay').src;
      if(!newUsername) return;

      Swal.fire({ title: 'جاري الحفظ...', background: '#111', color: '#fff', allowOutsideClick: false, didOpen: () => { Swal.showLoading() }});
      
      try {
        // استخدام Promise.race لمنع التعليق
        await Promise.race([
          setDoc(doc(db, "users", user.uid), { username: newUsername, avatarUrl: newAvatarUrl }, { merge: true }),
          timeoutPromise
        ]);
        
        document.getElementById('playerNameDisplay').innerText = newUsername;
        document.getElementById('sidebarAvatarDisplay').src = newAvatarUrl;
        
        Swal.close(); 
        Swal.fire({ background: '#111', color: '#fff', icon: 'success', text: 'تم التحديث بنجاح.' });
      } catch(e) { 
        Swal.close(); 
        Swal.fire({ background: '#111', color: '#fff', icon: 'error', text: e.message }); 
      }
    });

    onAuthStateChanged(auth, async (user) => {
      const sidebar = document.getElementById('mainSidebar');
      const topActions = document.getElementById('topLeftActions');

      if (user) {
        let username = "Player", avatarUrl = defaultAvatar, jName = "Player", jNum = "10";
        try {
          const docSnap = await Promise.race([ getDoc(doc(db, "users", user.uid)), timeoutPromise ]);
          if (docSnap && docSnap.exists()) {
            const data = docSnap.data();
            username = data.username || username; avatarUrl = data.avatarUrl || avatarUrl;
            jName = data.jerseyName || username; jNum = data.jerseyNumber || jNum;
          }
        } catch(e) { console.log("Firestore error:", e); }
        
        document.getElementById('visitorWelcome').style.display = 'none';
        document.getElementById('visitorMenu').style.display = 'none';
        document.getElementById('playerWelcome').style.display = 'block';
        document.getElementById('playerMenu').style.display = 'block';
        document.getElementById('playerNameDisplay').innerText = username;
        
        const sideAvatar = document.getElementById('sidebarAvatarDisplay');
        sideAvatar.src = avatarUrl; sideAvatar.style.display = 'block';

        document.getElementById('profileUsername').value = username;
        document.getElementById('profileAvatarDisplay').src = avatarUrl;
        document.getElementById('profileJerseyName').value = jName;
        document.getElementById('profileJerseyNum').value = jNum;

        document.querySelectorAll('.avatar-option').forEach(el => {
          if(el.querySelector('img').src === avatarUrl) el.classList.add('selected');
          else el.classList.remove('selected');
        });
        tempSelectedAvatarUrl = avatarUrl;

        if(topActions) topActions.style.display = 'flex';
        sidebar.classList.add('logged-in-mobile');
        openPanel('homePanel', 'player', document.querySelector('.dash-item.active'));
      } else {
        if(topActions) topActions.style.display = 'none';
        sidebar.classList.remove('logged-in-mobile');
        document.getElementById('visitorWelcome').style.display = 'block';
        document.getElementById('visitorMenu').style.display = 'flex';
        document.getElementById('playerWelcome').style.display = 'none';
        document.getElementById('playerMenu').style.display = 'none';
      }
    });
  </script>
