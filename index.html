<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mayo Game - The Ascension</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Orbitron:wght@500;700;900&family=Cairo:wght@600;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body, html { width: 100%; height: 100%; overflow: hidden; background-color: #030305; font-family: 'Orbitron', 'Cairo', sans-serif; }

        .game-container { position: relative; width: 100%; height: 100%; background: radial-gradient(circle, #111116 0%, #030305 100%); display: flex; }
        .game-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 20%, rgba(0,0,0,0.85) 100%); pointer-events: none; z-index: 1;
        }

        .screen {
            position: absolute; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 30px; z-index: 2; width: 100%; height: 100%; transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(0.98); display: none !important; }

        #screen-start { align-items: flex-end; justify-content: flex-end; padding-bottom: 8%; padding-right: 10%; }

        .sony-btn {
            background: none; border: none; color: rgba(255, 255, 255, 0.7); font-family: 'Orbitron', 'Cinzel', sans-serif;
            font-size: 1.5rem; font-weight: 800; text-transform: uppercase; letter-spacing: 4px; cursor: pointer;
            position: relative; transition: all 0.3s ease; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9); padding: 5px 15px;
        }
        .sony-btn::after {
            content: ''; width: 0; height: 3px; background-color: #00f0ff; position: absolute; bottom: -5px; right: 0;
            transition: width 0.3s ease; box-shadow: 0 0 10px #00f0ff;
        }
        .sony-btn:hover { color: #ffffff; text-shadow: 0 0 15px rgba(0, 240, 255, 0.6), 2px 2px 4px rgba(0, 0, 0, 1); transform: translateX(-5px); }
        .sony-btn:hover::after { width: 100%; }
        .start-title { font-size: 3.5rem; letter-spacing: 8px; color: #ffffff; }

        .input-group { display: flex; flex-direction: column; align-items: center; gap: 12px; width: 100%; }
        .input-label { color: rgba(255, 255, 255, 0.4); font-size: 0.85rem; letter-spacing: 4px; text-transform: uppercase; text-align: center; }
        .sony-input {
            background: rgba(0,0,0,0.5); border: none; border-bottom: 2px solid rgba(255, 255, 255, 0.2); color: #fff;
            padding: 10px; font-size: 1.3rem; font-family: 'Cairo', 'Orbitron', sans-serif; text-align: center; outline: none; width: 100%; max-width: 350px;
        }
        .sony-input:focus { border-bottom-color: #00f0ff; }

        .free-customizer { display: flex; align-items: center; justify-content: center; gap: 60px; width: 90%; max-width: 1000px; }
        .controls-column { display: flex; flex-direction: column; gap: 20px; width: 100%; max-width: 400px; }
        .select-trigger-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff;
            padding: 14px 20px; font-size: 0.9rem; letter-spacing: 2px; cursor: pointer; text-align: left; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s;
        }
        .select-trigger-btn:hover { border-color: #00f0ff; background: rgba(0, 240, 255, 0.05); }
        .pop-menu { display: none; flex-direction: column; gap: 8px; background: rgba(15, 15, 22, 0.98); border: 1px solid rgba(0, 240, 255, 0.3); padding: 10px; position: absolute; width: 100%; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .pop-opt { padding: 10px; color: rgba(255,255,255,0.7); font-size: 0.9rem; cursor: pointer; transition: all 0.2s; }
        .pop-opt:hover, .pop-opt.selected { background: rgba(0, 240, 255, 0.15); color: #fff; }

        .preview-column { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; max-width: 400px; gap: 25px; }
        .avatar-frame-wrapper { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; }
        .core-avatar { width: 100px; height: 100px; border-radius: 50%; background-size: cover; background-position: center; z-index: 2; box-shadow: 0 0 15px rgba(0,0,0,0.6); }
        .ornament-border { position: absolute; width: 100px; height: 100px; z-index: 3; pointer-events: none; border-radius: 50%; transition: all 0.2s ease; }

        .ornament-diamond { border: 4px solid #b9f2ff; box-shadow: 0 0 20px #00f0ff, inset 0 0 15px rgba(0, 240, 255, 0.5); }
        .ornament-galaxy { border: 4px solid #a855f7; box-shadow: 0 0 25px rgba(168, 85, 247, 0.6), inset 0 0 10px rgba(0,0,0,0.8); }
        .ornament-bronze { border: 4px solid #cd7f32; }
        .ornament-gold { border: 5px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.3); }

        .player-tag-name { color: #ffffff; font-size: 1.1rem; font-weight: 800; background: rgba(0, 0, 0, 0.6); padding: 4px 18px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        
        .lobby-action-row { display: flex; gap: 20px; margin-top: 10px; width: 100%; justify-content: center; flex-wrap: wrap; }
        #join-input-area { flex-direction: column; align-items: center; gap: 15px; }

        .central-lobby { display: flex; flex-direction: column; align-items: center; gap: 40px; width: 100%; }
        .central-player-grid { display: flex; justify-content: center; align-items: center; gap: 40px; flex-wrap: wrap; width: 90%; }
        .lobby-card { display: flex; flex-direction: column; align-items: center; gap: 15px; position: relative; }
        .room-badge { color: #ffdf00; font-size: 2.2rem; font-weight: 900; letter-spacing: 5px; text-shadow: 0 0 20px rgba(255, 223, 0, 0.6), 2px 2px 4px #000; margin-top: 5px; text-align: center;}
        .host-indicator { position: absolute; top: -22px; background: #ffdf00; color: #000; font-size: 0.65rem; font-weight: 900; padding: 2px 8px; border-radius: 3px; box-shadow: 0 0 10px #ffdf00; z-index: 10; }
        .back-mini-btn { font-size: 1.1rem; color: rgba(255, 255, 255, 0.3); }
        .back-mini-btn:hover { color: #ff4a4a; } .back-mini-btn:hover::after { background-color: #ff4a4a; }

        /* ساحة اللعب المتجاوبة */
        #game-canvas-container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .ingame-ui-header { position: absolute; top: 15px; width: 95%; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .ingame-card { display: flex; align-items: center; gap: 10px; background: rgba(0, 0, 0, 0.6); padding: 8px 15px; border-radius: 50px; border: 1px solid rgba(255,255,255,0.1); }
        .ingame-card .name { color: #fff; font-weight: bold; font-size: 0.9rem; }
        .ingame-card .status { font-size: 0.7rem; letter-spacing: 1px; }

        .grid-arena { position: relative; width: 90vw; max-width: 500px; aspect-ratio: 1 / 1; display: grid; grid-template-columns: repeat(6, 1fr); grid-template-rows: repeat(6, 1fr); gap: 4px; margin-bottom: 80px; }
        .cube-tile { background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%); border: 2px solid #4338ca; border-radius: 6px; transition: transform 0.1s, opacity 0.5s ease-out, background 0.3s; }
        .cube-tile.warn { background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%); border-color: #ef4444; }
        .cube-tile.collapsed { opacity: 0; transform: translateY(100px) scale(0.5); pointer-events: none; }

        .game-entity { position: absolute; border-radius: 50%; background-size: cover; border: 3px solid #fff; box-shadow: 0 0 15px #fff; transition: left 0.15s ease-out, top 0.15s ease-out, width 0.15s, height 0.15s; z-index: 5; }
        .game-entity.p1-style { border-color: #00f0ff; box-shadow: 0 0 15px #00f0ff; }
        .game-entity.p2-style { border-color: #ff4a4a; box-shadow: 0 0 15px #ff4a4a; }

        .mobile-controls { position: absolute; bottom: 15px; display: flex; gap: 15px; z-index: 10; }
        .ctrl-btn { width: 55px; height: 55px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s;}
        .ctrl-btn:active { background: #00f0ff; color: #000; transform: scale(0.9); }

        /* شاشة التصويت */
        .vote-grid { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; justify-content: center;}
        .vote-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; gap: 15px; cursor: pointer; transition: all 0.3s; position: relative; width: 160px; }
        .vote-card:hover, .vote-card.voted { border-color: #ffd700; background: rgba(255, 215, 0, 0.05); box-shadow: 0 0 25px rgba(255,215,0,0.2); }
        .mvp-badge { display: none; position: absolute; top: -15px; background: linear-gradient(45deg, #ffd700, #ffaa00); color: #000; font-weight: 900; padding: 4px 15px; border-radius: 20px; font-size: 0.8rem; box-shadow: 0 0 15px #ffd700; }
        .vote-card.voted .mvp-badge { display: block; }

        /* دعم شاشات الجوال */
        @media (max-width: 768px) {
            #screen-start { align-items: center; justify-content: center; padding: 0; }
            .start-title { font-size: 2.8rem; }
            .free-customizer { flex-direction: column; gap: 30px; }
            .sony-input { width: 100%; max-width: 100%; }
            .room-badge { font-size: 1.8rem; }
            .mobile-controls { gap: 10px; }
            .ctrl-btn { width: 50px; height: 50px; }
            .grid-arena { margin-bottom: 70px; }
        }
    </style>
</head>
<body>

    <div class="game-container">
        
        <!-- صفحة البدء -->
        <div id="screen-start" class="screen">
            <button class="sony-btn start-title" onclick="switchScreen('screen-identity')">START</button>
        </div>

        <!-- التخصيص وواجهة الدخول -->
        <div id="screen-identity" class="screen hidden">
            <div class="free-customizer">
                <div class="controls-column">
                    <div class="input-group">
                        <span class="input-label">PLAYER NAME</span>
                        <input type="text" id="player-name" class="sony-input" placeholder="ENTER NAME..." maxlength="12">
                    </div>
                    
                    <div style="position: relative;">
                        <button class="select-trigger-btn" onclick="toggleMenu('pop-hero')">
                            <span>CHOOSE HERO AVATAR</span> <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="pop-menu" id="pop-hero">
                            <div class="pop-opt selected" onclick="changeHero('shadow')">SHADOW NINJA</div>
                            <div class="pop-opt" onclick="changeHero('blaze')">BLAZE SAMURAI</div>
                            <div class="pop-opt" onclick="changeHero('frost')">FROST MAGE</div>
                            <div class="pop-opt" onclick="changeHero('volt')">VOLT STRIKER</div>
                        </div>
                    </div>

                    <div style="position: relative;">
                        <button class="select-trigger-btn" onclick="toggleMenu('pop-tier')">
                            <span>CHOOSE BORDER ORNAMENT</span> <i class="fa-solid fa-chevron-down"></i>
                        </button>
                        <div class="pop-menu" id="pop-tier">
                            <div class="pop-opt selected" onclick="changeOrnament('diamond')">DIAMOND SHINE 💎</div>
                            <div class="pop-opt" onclick="changeOrnament('galaxy')">GALAXY & TREES 🌌</div>
                            <div class="pop-opt" onclick="changeOrnament('bronze')">BRONZE WINGS</div>
                            <div class="pop-opt" onclick="changeOrnament('gold')">MYTHIC GOLD ★</div>
                        </div>
                    </div>
                </div>

                <div class="preview-column">
                    <span class="input-label">IDENTITY PREVIEW</span>
                    <div class="avatar-frame-wrapper">
                        <div id="ornament-live-border" class="ornament-border ornament-diamond"></div>
                        <div id="avatar-live-core" class="core-avatar"></div>
                    </div>
                    
                    <!-- أزرار الإنشاء أو الدخول -->
                    <div class="lobby-action-row" id="action-buttons-area">
                        <button class="sony-btn" onclick="buildLobby('create')" style="color: #00f0ff;">CREATE ROOM</button>
                        <button class="sony-btn" onclick="showJoinInput()">JOIN ROOM</button>
                    </div>

                    <!-- واجهة إدخال كود الغرفة (تظهر عند ضغط JOIN ROOM) -->
                    <div class="lobby-action-row hidden" id="join-input-area">
                        <input type="text" id="join-room-code" class="sony-input" placeholder="ROOM-XXXX" style="border:1px solid rgba(0,240,255,0.5); border-radius:5px;">
                        <div style="display:flex; gap:10px;">
                            <button class="sony-btn" onclick="buildLobby('join')" style="color:#00ff88; font-size:1.1rem;">ENTER</button>
                            <button class="sony-btn back-mini-btn" onclick="hideJoinInput()" style="font-size:1.1rem;">CANCEL</button>
                        </div>
                    </div>

                </div>
            </div>
            <button class="sony-btn back-mini-btn" onclick="switchScreen('screen-start')">BACK</button>
        </div>

        <!-- اللوبي -->
        <div id="screen-lobby" class="screen hidden">
            <div class="central-lobby">
                <div style="text-align: center;">
                    <span class="input-label" style="opacity:0.4;">MATCHMAKING LOBBY</span>
                    <div class="room-badge" id="lobby-room-number">ROOM-XXXX</div>
                </div>
                <div class="central-player-grid" id="player-mesh"></div>
                <div class="lobby-buttons" style="display:flex; flex-direction:column; align-items:center; gap:15px;">
                    <button class="sony-btn" id="btn-launch-match" style="color: #00ff88; display:none;" onclick="triggerGameStart()">LAUNCH MATCH</button>
                    <button class="sony-btn back-mini-btn" onclick="location.reload()">LEAVE LOBBY</button>
                </div>
            </div>
        </div>

        <!-- اللعبة (Falling Grid) -->
        <div id="screen-gameplay" class="screen hidden">
            <div id="game-canvas-container">
                <div class="ingame-ui-header" id="ingame-ui-header"></div>
                
                <div class="grid-arena" id="arena-grid"></div>
                
                <!-- الكائنات المتحركة -->
                <div id="entity-p1" class="game-entity p1-style" style="display:none;"></div>
                <div id="entity-p2" class="game-entity p2-style" style="display:none;"></div>
                
                <div class="mobile-controls">
                    <button class="ctrl-btn" onclick="requestMove(-1, 0)"><i class="fa-solid fa-arrow-left"></i></button>
                    <button class="ctrl-btn" onclick="requestMove(0, -1)"><i class="fa-solid fa-arrow-up"></i></button>
                    <button class="ctrl-btn" onclick="requestMove(0, 1)"><i class="fa-solid fa-arrow-down"></i></button>
                    <button class="ctrl-btn" onclick="requestMove(1, 0)"><i class="fa-solid fa-arrow-right"></i></button>
                </div>
            </div>
        </div>

        <!-- التصويت (MVP) -->
        <div id="screen-voting" class="screen hidden">
            <span class="input-label" style="color:#ffd700; text-align:center;">MATCH FINISHED</span>
            <h1 style="color:#fff; font-family:'Cinzel'; letter-spacing:2px; text-align:center; font-size:2rem;">VOTE FOR MVP</h1>
            <div class="vote-grid" id="vote-grid-container"></div>
            <button class="sony-btn" style="margin-top: 30px; color:#ffdf00;" onclick="location.reload()">MAIN MENU</button>
        </div>

    </div>

    <!-- استدعاء Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        /* 1. إعدادات Firebase الخاصة بك */
        const firebaseConfig = {
            apiKey: "AIzaSyCOGGmv-bjlZlBLr1T8tAvBtALAcp-7HEw",
            authDomain: "mayo-game.firebaseapp.com",
            databaseURL: "https://mayo-game-default-rtdb.firebaseio.com",
            projectId: "mayo-game",
            storageBucket: "mayo-game.firebasestorage.app",
            messagingSenderId: "153594840301",
            appId: "1:153594840301:web:17e64f7ae8a1d7825a38e4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        /* 2. بيانات اللعبة المحلية */
        const animeHeroes = {
            'shadow': { url: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=shadow&backgroundColor=312e81' },
            'blaze': { url: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=blaze&backgroundColor=991b1b' },
            'frost': { url: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=frost&backgroundColor=065f46' },
            'volt': { url: 'https://api.dicebear.com/7.x/bottts-neutral/svg?seed=volt&backgroundColor=854d0e' }
        };

        let currentHero = 'shadow';
        let currentOrnament = 'diamond';
        let pName = "";
        
        let currentRoomId = null;
        let myPlayerId = null; 
        let isGameStartedLocally = false;
        let latestRoomData = null; // لحفظ بيانات اللعبة وإعادة ضبط المقاسات عند تدوير الجوال
        
        const gridSize = 6;
        let hostLoop = null;

        // تهيئة واجهة المستخدم الأساسية
        document.getElementById('avatar-live-core').style.backgroundImage = `url('${animeHeroes['shadow'].url}')`;

        function toggleMenu(menuId) {
            const menu = document.getElementById(menuId);
            const isVisible = menu.style.display === 'flex';
            document.querySelectorAll('.pop-menu').forEach(m => m.style.display = 'none');
            menu.style.display = isVisible ? 'none' : 'flex';
            event.stopPropagation();
        }
        document.addEventListener('click', () => { document.querySelectorAll('.pop-menu').forEach(m => m.style.display = 'none'); });

        function changeHero(key) {
            currentHero = key;
            document.getElementById('avatar-live-core').style.backgroundImage = `url('${animeHeroes[key].url}')`;
            document.querySelectorAll('#pop-hero .pop-opt').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function changeOrnament(tier) {
            currentOrnament = tier;
            const border = document.getElementById('ornament-live-border');
            border.className = 'ornament-border ornament-' + tier;
            document.querySelectorAll('#pop-tier .pop-opt').forEach(el => el.classList.remove('selected'));
            event.target.classList.add('selected');
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.add('hidden');
                s.style.display = 'none';
            });
            const activeScreen = document.getElementById(screenId);
            activeScreen.classList.remove('hidden');
            activeScreen.style.display = 'flex';
        }

        /* دوال إظهار وإخفاء واجهة إدخال كود الغرفة */
        function showJoinInput() {
            document.getElementById('action-buttons-area').classList.add('hidden');
            document.getElementById('join-input-area').classList.remove('hidden');
            document.getElementById('join-room-code').focus();
        }
        function hideJoinInput() {
            document.getElementById('action-buttons-area').classList.remove('hidden');
            document.getElementById('join-input-area').classList.add('hidden');
        }

        /* 3. نظام الغرف والاتصال بـ Firebase */
        function buildLobby(actionType) {
            const inputName = document.getElementById('player-name').value.trim();
            if(!inputName) { alert("Please type your profile name first!"); return; }
            pName = inputName;

            const myData = { name: pName, hero: currentHero, ornament: currentOrnament, x: (actionType === 'create' ? 1 : 4), y: 3, status: "alive" };

            if(actionType === 'create') {
                currentRoomId = "ROOM-" + Math.floor(1000 + Math.random() * 9000);
                myPlayerId = "p1"; 
                document.getElementById('btn-launch-match').style.display = 'block'; 
                
                let initialGrid = {};
                for(let r=0; r<gridSize; r++){
                    for(let c=0; c<gridSize; c++){ initialGrid[`${c}_${r}`] = 'solid'; }
                }

                db.ref('rooms/' + currentRoomId).set({
                    status: "waiting",
                    grid: initialGrid,
                    players: { p1: myData }
                });

                document.getElementById('lobby-room-number').innerText = currentRoomId;
                switchScreen('screen-lobby');
                listenToRoomChanges();

            } else if(actionType === 'join') {
                let roomCodeInput = document.getElementById('join-room-code').value.trim().toUpperCase();
                if(!roomCodeInput) { alert("Please enter a room code!"); return; }
                
                // إضافة كلمة ROOM- إذا نسي اللاعب كتابتها
                if(!roomCodeInput.startsWith("ROOM-")) {
                    roomCodeInput = "ROOM-" + roomCodeInput;
                }
                
                currentRoomId = roomCodeInput;
                myPlayerId = "p2";
                
                db.ref('rooms/' + currentRoomId).once('value', snapshot => {
                    if(snapshot.exists() && snapshot.val().status === "waiting") {
                        db.ref('rooms/' + currentRoomId + '/players/p2').set(myData);
                        db.ref('rooms/' + currentRoomId).update({ status: "full" });
                        
                        document.getElementById('lobby-room-number').innerText = currentRoomId;
                        switchScreen('screen-lobby');
                        listenToRoomChanges();
                    } else { 
                        alert("Room not found or game already started! Check the code."); 
                    }
                });
            }
        }

        function triggerGameStart() {
            if(myPlayerId !== 'p1') return;
            db.ref('rooms/' + currentRoomId).update({ status: "playing" });
        }

        /* 4. الاستماع الفوري لقاعدة البيانات */
        function listenToRoomChanges() {
            db.ref('rooms/' + currentRoomId).on('value', snapshot => {
                const room = snapshot.val();
                if(!room) return;
                latestRoomData = room; // حفظ لتحديث مقاسات الجوال

                if(room.status === "waiting" || room.status === "full") {
                    updateLobbyUI(room.players);
                }
                
                if(room.status === "playing") {
                    if(!isGameStartedLocally) initGameplayUI(room.players);
                    updateGameplay(room);
                }

                if(room.status === "voting") {
                    if(document.getElementById('screen-voting').classList.contains('hidden')) {
                        initVotingUI(room.players);
                    }
                    updateVotes(room.votes);
                }
            });
        }

        function updateLobbyUI(players) {
            const grid = document.getElementById('player-mesh');
            let html = '';
            if(players.p1) html += generateLobbyCard("HOST", players.p1);
            if(players.p2) html += generateLobbyCard("PARTY", players.p2);
            grid.innerHTML = html;
        }

        function generateLobbyCard(label, data) {
            return `
                <div class="lobby-card">
                    <span class="host-indicator">${label}</span>
                    <div class="avatar-frame-wrapper">
                        <div class="ornament-border ornament-${data.ornament}"></div>
                        <div class="core-avatar" style="background-image: url('${animeHeroes[data.hero].url}')"></div>
                    </div>
                    <div class="player-tag-name">${data.name}</div>
                </div>`;
        }

        /* 5. منطق حلبة اللعب وتحديث مقاسات اللاعبين للشاشات */
        function initGameplayUI(players) {
            isGameStartedLocally = true;
            switchScreen('screen-gameplay');
            
            const arena = document.getElementById('arena-grid');
            arena.innerHTML = '';
            for(let r=0; r<gridSize; r++){
                for(let c=0; c<gridSize; c++){
                    let tile = document.createElement('div');
                    tile.className = 'cube-tile';
                    tile.id = `tile-${c}-${r}`;
                    arena.appendChild(tile);
                }
            }

            let headerHtml = '';
            ['p1', 'p2'].forEach(pid => {
                if(players[pid]) {
                    headerHtml += `
                    <div class="ingame-card">
                        <div class="avatar-frame-wrapper" style="width:35px; height:35px;">
                            <div class="ornament-border ornament-${players[pid].ornament}" style="width:35px; height:35px; border-width:2px;"></div>
                            <div class="core-avatar" style="width:30px; height:30px; background-image: url('${animeHeroes[players[pid].hero].url}')"></div>
                        </div>
                        <div class="info" style="display:flex; flex-direction:column;">
                            <span class="name">${players[pid].name}</span>
                            <span class="status" id="status-${pid}" style="color:#00ff88;">ALIVE</span>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('ingame-ui-header').innerHTML = headerHtml;

            if(players.p1) {
                let e1 = document.getElementById('entity-p1');
                e1.style.display = 'block';
                e1.style.backgroundImage = `url('${animeHeroes[players.p1.hero].url}')`;
            }
            if(players.p2) {
                let e2 = document.getElementById('entity-p2');
                e2.style.display = 'block';
                e2.style.backgroundImage = `url('${animeHeroes[players.p2.hero].url}')`;
            }

            if(myPlayerId === 'p1') startHostEngine();

            document.onkeydown = function(e) {
                if (e.key === 'ArrowUp' || e.key === 'w') requestMove(0, -1);
                if (e.key === 'ArrowDown' || e.key === 's') requestMove(0, 1);
                if (e.key === 'ArrowLeft' || e.key === 'a') requestMove(-1, 0);
                if (e.key === 'ArrowRight' || e.key === 'd') requestMove(1, 0);
            };
        }

        function updateGameplay(room) {
            const gridData = room.grid;
            const players = room.players;
            const arena = document.getElementById('arena-grid');

            for(let key in gridData) {
                let [c, r] = key.split('_');
                let tile = document.getElementById(`tile-${c}-${r}`);
                if(tile) {
                    tile.className = 'cube-tile'; 
                    if(gridData[key] === 'warn') tile.classList.add('warn');
                    if(gridData[key] === 'collapsed') tile.classList.add('collapsed');
                }
            }

            // ذكاء تحجيم اللاعب ليطابق المكعب مهما كان حجم الشاشة
            ['p1', 'p2'].forEach(pid => {
                if(players[pid]) {
                    let entity = document.getElementById(`entity-${pid}`);
                    let statText = document.getElementById(`status-${pid}`);
                    
                    if(players[pid].status === 'alive') {
                        let tile = document.getElementById(`tile-${players[pid].x}-${players[pid].y}`);
                        if(tile) {
                            // حساب الحجم والموقع ديناميكياً بناءً على حجم المكعب في الجوال أو الكمبيوتر
                            let size = tile.offsetWidth - 4;
                            entity.style.width = `${size}px`;
                            entity.style.height = `${size}px`;
                            entity.style.left = `${tile.offsetLeft + arena.offsetLeft + 2}px`;
                            entity.style.top = `${tile.offsetTop + arena.offsetTop + 2}px`;
                        }
                    } else {
                        entity.style.opacity = '0';
                        statText.innerText = "OUT";
                        statText.style.color = "#ff4a4a";
                    }
                }
            });
        }

        // تحديث مقاسات اللاعبين فوراً عند تدوير شاشة الجوال أو تصغير المتصفح
        window.addEventListener('resize', () => {
            if (isGameStartedLocally && latestRoomData) {
                updateGameplay(latestRoomData);
            }
        });

        function requestMove(dx, dy) {
            db.ref(`rooms/${currentRoomId}/players/${myPlayerId}`).once('value', snap => {
                let pData = snap.val();
                if(pData && pData.status === 'alive') {
                    let nx = pData.x + dx; let ny = pData.y + dy;
                    if(nx >= 0 && nx < gridSize && ny >= 0 && ny < gridSize) {
                        db.ref(`rooms/${currentRoomId}/players/${myPlayerId}`).update({ x: nx, y: ny });
                    }
                }
            });
        }

        function startHostEngine() {
            hostLoop = setInterval(() => {
                db.ref(`rooms/${currentRoomId}`).once('value', snap => {
                    let room = snap.val();
                    if(!room || room.status !== 'playing') return;

                    let updates = {};
                    let activeTiles = Object.keys(room.grid).filter(k => room.grid[k] !== 'collapsed');
                    
                    activeTiles.forEach(k => {
                        if(room.grid[k] === 'warn') updates[`grid/${k}`] = 'collapsed';
                    });

                    let solidTiles = activeTiles.filter(k => room.grid[k] === 'solid');
                    if(solidTiles.length > 0) {
                        let randTile = solidTiles[Math.floor(Math.random() * solidTiles.length)];
                        updates[`grid/${randTile}`] = 'warn';
                    }

                    let p1Alive = room.players.p1 && room.players.p1.status === 'alive';
                    let p2Alive = room.players.p2 && room.players.p2.status === 'alive';

                    ['p1', 'p2'].forEach(pid => {
                        if(room.players[pid] && room.players[pid].status === 'alive') {
                            let posKey = `${room.players[pid].x}_${room.players[pid].y}`;
                            if(updates[`grid/${posKey}`] === 'collapsed' || room.grid[posKey] === 'collapsed') {
                                updates[`players/${pid}/status`] = 'dead';
                                if(pid === 'p1') p1Alive = false;
                                if(pid === 'p2') p2Alive = false;
                            }
                        }
                    });

                    if((room.players.p2 && (!p1Alive || !p2Alive)) || (!room.players.p2 && !p1Alive)) {
                        updates['status'] = 'voting';
                        clearInterval(hostLoop);
                    }

                    db.ref(`rooms/${currentRoomId}`).update(updates);
                });
            }, 1000);
        }

        /* 6. نظام التصويت */
        function initVotingUI(players) {
            switchScreen('screen-voting');
            let html = '';
            ['p1', 'p2'].forEach(pid => {
                if(players[pid]) {
                    html += `
                    <div class="vote-card" id="vote-card-${pid}" onclick="castVote('${pid}')">
                        <span class="mvp-badge" id="badge-${pid}">MVP👑</span>
                        <div class="avatar-frame-wrapper">
                            <div class="ornament-border ornament-${players[pid].ornament}"></div>
                            <div class="core-avatar" style="background-image: url('${animeHeroes[players[pid].hero].url}')"></div>
                        </div>
                        <div class="player-tag-name">${players[pid].name} <br> <small id="votecount-${pid}">0 Votes</small></div>
                    </div>`;
                }
            });
            document.getElementById('vote-grid-container').innerHTML = html;
        }

        function castVote(targetPid) {
            db.ref(`rooms/${currentRoomId}/votes/${myPlayerId}`).set(targetPid);
        }

        function updateVotes(votesObj) {
            if(!votesObj) return;
            
            document.querySelectorAll('.vote-card').forEach(c => c.classList.remove('voted'));
            let counts = { p1: 0, p2: 0 };
            
            for(let voter in votesObj) {
                counts[votesObj[voter]]++;
            }

            ['p1', 'p2'].forEach(pid => {
                let el = document.getElementById(`votecount-${pid}`);
                if(el) {
                    el.innerText = `${counts[pid]} Votes`;
                    if(counts[pid] > 0) {
                        document.getElementById(`vote-card-${pid}`).classList.add('voted');
                    }
                }
            });
        }
    </script>
</body>
</html>
