<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة المؤامرة</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    :root {
      --bg-dark: #0f0f11; --panel-bg: #1c1c21; --red: #c0392b; --green: #27ae60; --gold: #f1c40f;
    }
    body {
      background-color: var(--bg-dark); color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center; margin: 0; padding: 20px;
    }
    .container {
      background-color: var(--panel-bg); padding: 30px; border-radius: 15px; max-width: 500px;
      margin: 30px auto; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8);
    }
    h1, h2 { color: var(--red); margin-bottom: 5px; text-shadow: 0 0 10px rgba(192,57,43,0.5); }
    p { color: #bdc3c7; margin-bottom: 25px; line-height: 1.6; }
    input {
      padding: 12px; font-size: 16px; width: 80%; border-radius: 8px; border: 1px solid #555;
      background-color: #111; color: white; margin-bottom: 15px; text-align: center;
    }
    input:focus { outline: none; border-color: var(--red); }
    button {
      background-color: var(--red); color: white; border: none; padding: 12px 25px; font-size: 16px;
      border-radius: 8px; cursor: pointer; width: 85%; transition: 0.3s; font-weight: bold; margin-bottom: 10px;
    }
    button:hover { background-color: #e74c3c; transform: scale(1.05); }
    .btn-secondary { background-color: #2980b9; }
    .btn-secondary:hover { background-color: #3498db; }
    .btn-success { background-color: var(--green); }
    
    /* لوحة اللعب */
    .board { display: flex; justify-content: space-around; margin: 20px 0; padding: 15px; background: #000; border-radius: 10px; }
    .card-slot { width: 45%; padding: 15px 0; border-radius: 8px; font-weight: bold; font-size: 20px; }
    .slot-red { border: 2px solid var(--red); color: var(--red); }
    .slot-green { border: 2px solid var(--green); color: var(--green); }
    .fail-track { margin: 15px 0; color: var(--gold); font-size: 18px; }
    
    /* قائمة اللاعبين */
    #playersList, #gamePlayersList { list-style: none; padding: 0; text-align: right; margin-top: 20px; }
    #playersList li, #gamePlayersList li { background-color: #222; margin: 5px 0; padding: 12px; border-radius: 5px; border-right: 4px solid var(--red); display: flex; justify-content: space-between; align-items: center;}
    .dead-player { opacity: 0.5; text-decoration: line-through; border-right-color: #555 !important; }
    .role-card { margin-top: 20px; padding: 15px; border-radius: 10px; border: 2px dashed #555; background: #000; }
  </style>
</head>
<body>

  <div class="container" id="loginScreen">
    <h1>🎭 المؤامرة</h1>
    <p>الخداع، التحالفات، والبقاء للأذكى</p>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." required>
    <hr style="border-color: #333; margin: 20px 0;">
    <button id="createRoomBtn">✨ إنشاء غرفة جديدة</button>
    <hr style="border-color: #333; margin: 20px 0;">
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة" maxlength="4" style="text-transform: uppercase;">
    <button id="joinRoomBtn" class="btn-secondary">🔗 انضمام للغرفة</button>
  </div>

  <div class="container" id="lobbyScreen" style="display: none;">
    <h2>غرفة الانتظار ⏳</h2>
    <h1 style="color: var(--green); letter-spacing: 5px;" id="roomCodeDisplay">----</h1>
    <p>شارك الكود. اللعبة تدعم (5 إلى 12 لاعب)</p>
    <ul id="playersList"></ul>
    <h3 id="playerCount" style="color: var(--gold);">العدد: 0</h3>
    <button id="startGameBtn" class="btn-success" style="display: none;">🚀 بدء المؤامرة</button>
    <p id="waitingMessage" style="display: none; color: #3498db;">بانتظار المالك لبدء اللعبة...</p>
  </div>

  <div class="container" id="gameScreen" style="display: none; max-width: 800px;">
    <h2>طاولة المؤامرة 🩸</h2>
    
    <div class="board">
      <div class="card-slot slot-red">بطاقات حمراء<br><span id="redScore" style="font-size: 30px;">0</span> / 6</div>
      <div class="card-slot slot-green">بطاقات خضراء<br><span id="greenScore" style="font-size: 30px;">0</span> / 5</div>
    </div>
    <div class="fail-track">فشل الحكومة: <span id="failScore">0</span> / 2</div>

    <div class="role-card" id="myRoleDisplay">
      <h3 id="myRoleTitle" style="margin: 0 0 10px 0;"></h3>
      <p id="myRoleDesc" style="margin: 0; font-size: 14px;"></p>
      <div id="spiesListDiv" style="color: #ff9999; margin-top: 10px; font-weight: bold;"></div>
    </div>

    <div id="actionArea" style="margin-top: 20px; padding: 15px; background: #2c3e50; border-radius: 10px; display: none;">
      <h3 id="actionTitle" style="color: white; margin-top:0;"></h3>
      <div id="actionContent"></div>
    </div>

    <h3 style="text-align: right; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 30px;">اللاعبون</h3>
    <ul id="gamePlayersList"></ul>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect, update, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 🔴🔴🔴 ضع بيانات فايربيس الخاصة بك هنا 🔴🔴🔴
    const firebaseConfig = {
      apiKey: "AIzaSyCu5Hbu2Rqml7_4DICZf8XyM9B4hzbpdOQ",
      authDomain: "ploska-ae755.firebaseapp.com",
      databaseURL: "https://ploska-ae755-default-rtdb.firebaseio.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // المتغيرات
    let myKey = null, currentRoom = "", isOwner = false;
    let gameData = {};

    // دوال مساعدة
    const uid = () => Math.random().toString(36).substr(2, 9);
    const Toast = Swal.mixin({ toast: true, position: 'top', showConfirmButton: false, timer: 3000, timerProgressBar: true });

    // الدخول للغرفة
    function joinGame(name, code, ownerFlag) {
      isOwner = ownerFlag;
      currentRoom = code;
      
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('lobbyScreen').style.display = 'block';
      document.getElementById('roomCodeDisplay').innerText = code;
      
      if(isOwner) {
        document.getElementById('startGameBtn').style.display = 'block';
      } else {
        document.getElementById('waitingMessage').style.display = 'block';
      }

      const playerRef = push(ref(db, `rooms/${code}/players`));
      myKey = playerRef.key;
      set(playerRef, { name: name, isOwner: isOwner, isAlive: true });
      onDisconnect(playerRef).remove();

      // مراقبة الغرفة
      onValue(ref(db, `rooms/${code}`), (snapshot) => {
        const data = snapshot.val();
        if(!data) return;
        gameData = data;

        // تحديث قائمة اللوبي
        if(data.status === 'waiting') {
          const pList = document.getElementById('playersList');
          pList.innerHTML = '';
          let count = 0;
          for(let k in data.players) {
            count++;
            pList.innerHTML += `<li>${data.players[k].name} ${data.players[k].isOwner ? '👑' : ''}</li>`;
          }
          document.getElementById('playerCount').innerText = `العدد: ${count}`;
        }
        
        // الانتقال للعب
        if(data.status && data.status !== 'waiting') {
          document.getElementById('lobbyScreen').style.display = 'none';
          document.getElementById('gameScreen').style.display = 'block';
          updateGameUI();
        }
      });
    }

    document.getElementById('createRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value;
      if(!name) return;
      const code = Math.random().toString(36).substr(2, 4).toUpperCase();
      set(ref(db, `rooms/${code}/status`), 'waiting');
      joinGame(name, code, true);
    };

    document.getElementById('joinRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value;
      const code = document.getElementById('roomCodeInput').value.toUpperCase();
      if(!name || code.length < 4) return;
      joinGame(name, code, false);
    };

    // خوارزمية بدء اللعبة (توزيع الأدوار وبناء الكومة)
    document.getElementById('startGameBtn').onclick = async () => {
      const snap = await get(ref(db, `rooms/${currentRoom}/players`));
      const players = snap.val();
      const pKeys = Object.keys(players);
      const count = pKeys.length;

      // if(count < 5 || count > 12) { Swal.fire('خطأ', 'العدد يجب أن يكون من 5 إلى 12', 'error'); return; }

      // خلط اللاعبين
      pKeys.sort(() => Math.random() - 0.5);

      // تحديد عدد المجرمين
      let crimCount = 2;
      if(count >= 8 && count <= 11) crimCount = 3;
      if(count === 12) crimCount = 4;

      let updates = {};
      
      // توزيع الأدوار
      pKeys.forEach((k, i) => {
        if(i === 0) updates[`rooms/${currentRoom}/players/${k}/role`] = 'المجرم الأساسي';
        else if (i < crimCount) updates[`rooms/${currentRoom}/players/${k}/role`] = 'مساعد مجرم';
        else updates[`rooms/${currentRoom}/players/${k}/role`] = 'مواطن';
      });

      // بناء كومة البطاقات
      let deck = [];
      let redCount = (count <= 8) ? 11 : (count <= 10) ? 13 : 15;
      for(let i=0; i<redCount; i++) deck.push('R');
      for(let i=0; i<6; i++) deck.push('G');
      deck.sort(() => Math.random() - 0.5);

      // إعدادات الطاولة
      updates[`rooms/${currentRoom}/board/red`] = 0;
      updates[`rooms/${currentRoom}/board/green`] = 0;
      updates[`rooms/${currentRoom}/board/fail`] = 0;
      updates[`rooms/${currentRoom}/deck`] = deck;
      updates[`rooms/${currentRoom}/turnOrder`] = pKeys; // ترتيب اللعب
      updates[`rooms/${currentRoom}/currentTurnIndex`] = 0; 
      
      // إعلان الرئيس الأول
      updates[`rooms/${currentRoom}/status`] = 'nomination'; // مرحلة الترشيح
      updates[`rooms/${currentRoom}/currentPresident`] = pKeys[0];

      await update(ref(db), updates);

      // إشعار فخم للجميع
      set(ref(db, `rooms/${currentRoom}/globalAlert`), {
        title: `تم تعيين ${players[pKeys[0]].name} رئيساً للجولة`,
        text: 'بانتظار الرئيس لاختيار مستشار',
        icon: 'info',
        id: uid()
      });
    };

    // تحديث الشاشة بناءً على حالة اللعبة
    let lastAlertId = null;
    function updateGameUI() {
      const data = gameData;
      const me = data.players[myKey];

      // 1. الإشعارات العامة (تظهر مرة واحدة للكل)
      if(data.globalAlert && data.globalAlert.id !== lastAlertId) {
        Swal.fire({
          title: data.globalAlert.title,
          text: data.globalAlert.text,
          icon: data.globalAlert.icon,
          background: '#1c1c21',
          color: '#fff',
          confirmButtonColor: '#c0392b'
        });
        lastAlertId = data.globalAlert.id;
      }

      // 2. تحديث العدادات
      document.getElementById('redScore').innerText = data.board.red || 0;
      document.getElementById('greenScore').innerText = data.board.green || 0;
      document.getElementById('failScore').innerText = data.board.fail || 0;

      // 3. عرض دوري السري والمعرفة
      document.getElementById('myRoleTitle').innerText = me.role;
      const spiesDiv = document.getElementById('spiesListDiv');
      spiesDiv.innerHTML = '';
      
      if(me.role !== 'مواطن') {
        document.getElementById('myRoleDisplay').style.borderColor = 'var(--red)';
        
        let known = [];
        let pCount = Object.keys(data.players).length;
        
        for(let k in data.players) {
          if(k !== myKey && data.players[k].role !== 'مواطن') {
            // نظام المعرفة المعقد
            if(pCount === 5) { /* لا يعرفون بعض */ }
            else if (pCount >= 6 && pCount <= 10) known.push(`${data.players[k].name} (${data.players[k].role})`);
            else if (pCount === 11 && me.role === 'مساعد مجرم' && data.players[k].role === 'المجرم الأساسي') known.push(`${data.players[k].name} (المجرم الأساسي)`);
            // لضيق المساحة البرمجية تم تبسيط 12 لاعب
            else if (pCount === 12) known.push(`${data.players[k].name} (${data.players[k].role})`); 
          }
        }
        if(known.length > 0) spiesDiv.innerHTML = 'تعرف على: <br>' + known.join('<br>');
      } else {
        document.getElementById('myRoleDisplay').style.borderColor = 'var(--green)';
      }

      // 4. تحديث قائمة اللاعبين وإبراز الرئيس
      const gList = document.getElementById('gamePlayersList');
      gList.innerHTML = '';
      for(let k in data.players) {
        const p = data.players[k];
        let tags = '';
        if(data.currentPresident === k) tags += '<span style="background:var(--gold); color:#000; padding:2px 5px; border-radius:3px;">الرئيس</span> ';
        if(data.currentChancellor === k) tags += '<span style="background:#3498db; color:#fff; padding:2px 5px; border-radius:3px;">المستشار</span>';
        
        gList.innerHTML += `<li class="${p.isAlive ? '' : 'dead-player'}">
          ${p.name} <div>${tags}</div>
        </li>`;
      }

      // 5. التحكم بمنطقة الإجراءات (الترشيح)
      const actionArea = document.getElementById('actionArea');
      const actionTitle = document.getElementById('actionTitle');
      const actionContent = document.getElementById('actionContent');
      
      actionArea.style.display = 'none';

      if(data.status === 'nomination' && data.currentPresident === myKey) {
        actionArea.style.display = 'block';
        actionTitle.innerText = 'أنت الرئيس: اختر مستشارك';
        actionContent.innerHTML = '';
        
        for(let k in data.players) {
          if(k !== myKey && data.players[k].isAlive) {
            let btn = document.createElement('button');
            btn.innerText = data.players[k].name;
            btn.onclick = () => nominateChancellor(k, data.players[k].name);
            actionContent.appendChild(btn);
          }
        }
      }
    }

    // دالة ترشيح المستشار (ترسل للفايربيس وتغير الحالة للتصويت)
    async function nominateChancellor(chancellorKey, chancellorName) {
      let updates = {};
      updates[`rooms/${currentRoom}/currentChancellor`] = chancellorKey;
      updates[`rooms/${currentRoom}/status`] = 'voting'; // الانتقال لمرحلة التصويت
      
      // إرسال إشعار للكل
      updates[`rooms/${currentRoom}/globalAlert`] = {
        title: 'اكتمل تشكيل الحكومة',
        text: `الرئيس: ${gameData.players[myKey].name} | المستشار: ${chancellorName}\n(الرجاء الاستعداد للتصويت)`,
        icon: 'warning',
        id: uid()
      };
      
      await update(ref(db), updates);
    }
  </script>
</body>
</html>
