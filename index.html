<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة المؤامرة</title>
  <style>
    body { background-color: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
    .container { background-color: #222; padding: 30px; border-radius: 15px; max-width: 400px; margin: 50px auto; border: 1px solid #c0392b; box-shadow: 0 0 20px rgba(192, 57, 43, 0.4); }
    h1 { color: #e74c3c; margin-bottom: 5px;}
    p { color: #bdc3c7; margin-bottom: 25px;}
    input { padding: 12px; font-size: 16px; width: 80%; border-radius: 8px; border: 1px solid #555; background-color: #333; color: white; margin-bottom: 15px; text-align: center; }
    input:focus { outline: none; border-color: #e74c3c; }
    button { background-color: #c0392b; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 8px; cursor: pointer; width: 85%; transition: 0.3s; font-weight: bold; margin-bottom: 10px;}
    button:hover { background-color: #e74c3c; transform: scale(1.05); }
    .btn-secondary { background-color: #2980b9; }
    .btn-secondary:hover { background-color: #3498db; }
    #roomCodeDisplay { color: #2ecc71; font-size: 24px; letter-spacing: 3px; margin: 15px 0; background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #2ecc71; }
    
    /* تصميم قائمة اللاعبين */
    #playersList { list-style: none; padding: 0; font-size: 20px; text-align: right; }
    #playersList li { background-color: #333; margin: 5px 0; padding: 10px; border-radius: 5px; border-right: 4px solid #2ecc71; }
    
    /* تصميم خاص لمالك الغرفة */
    .owner-item { 
      background-color: #2c3e50 !important; 
      border-right: 4px solid #f1c40f !important; 
      margin-bottom: 25px !important; /* المسافة التي تفصل المالك عن البقية */
      position: relative;
    }
    .owner-badge {
      background-color: #f1c40f;
      color: #000;
      font-size: 12px;
      padding: 3px 8px;
      border-radius: 5px;
      margin-right: 10px;
      font-weight: bold;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <div class="container" id="loginScreen">
    <h1>🕵️‍♂️ المؤامرة</h1>
    <p>أدخل اسمك، ثم اختر إنشاء أو انضمام</p>
    
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." required>
    
    <hr style="border-color: #444; margin: 20px 0;">
    
    <button id="createRoomBtn">✨ إنشاء غرفة جديدة</button>
    
    <hr style="border-color: #444; margin: 20px 0;">
    
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة (للانضمام فقط)" maxlength="4" style="text-transform: uppercase;">
    <button id="joinRoomBtn" class="btn-secondary">🔗 انضمام للغرفة</button>
  </div>

  <div class="container" id="lobbyScreen" style="display: none;">
    <h1>غرفة الانتظار ⏳</h1>
    <div id="roomCodeDisplay">كود الغرفة: ----</div>
    <p>أرسل هذا الكود لأصدقائك للانضمام</p>
    
    <ul id="playersList"></ul>
    
    <h3 id="playerCount" style="color: #f1c40f;">العدد الحالي: 0</h3>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 🔴🔴🔴 الصق كود firebaseConfig حقك هنا (من فايربيس) 🔴🔴🔴
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };
    // 🔴🔴🔴 نهاية التعديل 🔴🔴🔴

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // ربط العناصر
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const nameInput = document.getElementById('playerName');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const loginScreen = document.getElementById('loginScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersList = document.getElementById('playersList');
    const playerCount = document.getElementById('playerCount');

    let myPlayerRef = null;
    let currentRoom = "";

    // إنشاء كود الغرفة
    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 4; i++) {
        code += chars.charAt(Math.floor(Math.random() * chars.length));
      }
      return code;
    }

    // دالة الدخول للغرفة (تم إضافة متغير isOwner)
    function enterRoom(name, roomCode, isOwner) {
      loginScreen.style.display = 'none';
      lobbyScreen.style.display = 'block';
      roomCodeDisplay.innerText = 'كود الغرفة: ' + roomCode;
      
      const roomRef = ref(db, 'rooms/' + roomCode + '/players');
      myPlayerRef = push(roomRef);
      
      // حفظ بيانات اللاعب مع صفة "المالك"
      set(myPlayerRef, { name: name, isOwner: isOwner });
      onDisconnect(myPlayerRef).remove();

      // مراقبة اللاعبين وفرزهم في الشاشة
      onValue(roomRef, (snapshot) => {
        let count = 0;
        let ownerHTML = '';
        let othersHTML = '';

        snapshot.forEach((childSnapshot) => {
          const player = childSnapshot.val();
          count++;
          
          if (player.isOwner) {
            // تصميم المالك
            ownerHTML = `<li class="owner-item">👑 ${player.name} <span class="owner-badge">مالك الغرفة</span></li>`;
          } else {
            // تصميم باقي اللاعبين
            othersHTML += `<li>👤 ${player.name}</li>`;
          }
        });

        // دمج المالك أولاً ثم البقية
        playersList.innerHTML = ownerHTML + othersHTML;
        playerCount.innerText = 'العدد الحالي: ' + count;
      });
    }

    // زر الإنشاء (يعطي اللاعب صفة المالك true)
    createRoomBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if(name === "") { alert("الرجاء كتابة اسمك أولاً!"); return; }
      
      currentRoom = generateRoomCode();
      enterRoom(name, currentRoom, true);
    });

    // زر الانضمام (يعطي اللاعب صفة عادي false)
    joinRoomBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      const code = roomCodeInput.value.trim().toUpperCase();
      
      if(name === "") { alert("الرجاء كتابة اسمك أولاً!"); return; }
      if(code === "" || code.length < 4) { alert("الرجاء كتابة كود الغرفة بشكل صحيح!"); return; }
      
      currentRoom = code;
      enterRoom(name, currentRoom, false);
    });

  </script>
</body>
</html>
