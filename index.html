<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة المؤامرة</title>
  <style>
    body { background-color: #111; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; }
    .container { background-color: #222; padding: 30px; border-radius: 15px; max-width: 400px; margin: 50px auto; border: 1px solid #c0392b; box-shadow: 0 0 20px rgba(192, 57, 43, 0.4); }
    h1 { color: #e74c3c; margin-bottom: 5px;}
    p { color: #bdc3c7; margin-bottom: 25px;}
    input { padding: 12px; font-size: 16px; width: 80%; border-radius: 8px; border: 1px solid #555; background-color: #333; color: white; margin-bottom: 15px; text-align: center; }
    input:focus { outline: none; border-color: #e74c3c; }
    button { background-color: #c0392b; color: white; border: none; padding: 12px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; width: 85%; transition: 0.3s; font-weight: bold; }
    button:hover { background-color: #e74c3c; transform: scale(1.05); }
    #playersList { list-style: none; padding: 0; font-size: 20px; text-align: right; }
    #playersList li { background-color: #333; margin: 5px 0; padding: 10px; border-radius: 5px; border-right: 4px solid #2ecc71; }
  </style>
</head>
<body>

  <div class="container" id="loginScreen">
    <h1>🕵️‍♂️ المؤامرة</h1>
    <p>أدخل اسمك للانضمام للغرفة السرية</p>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا...">
    <br>
    <button id="joinBtn">دخول اللعبة</button>
  </div>

  <div class="container" id="lobbyScreen" style="display: none;">
    <h1>غرفة الانتظار ⏳</h1>
    <p>بانتظار دخول باقي اللاعبين...</p>
    <ul id="playersList"></ul>
    <h3 id="playerCount" style="color: #f1c40f;">العدد الحالي: 0</h3>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // 🔴🔴🔴 امسح هذا المربع، والصق كود firebaseConfig الخاص بك من شاشة فايربيس هنا 🔴🔴🔴
    const firebaseConfig = {
      apiKey: "اكتب_الكود_حقك_هنا",
      authDomain: "ploska-ae755.firebaseapp.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };
    // 🔴🔴🔴 نهاية التعديل 🔴🔴🔴

    // تشغيل السيرفر
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // تعريف عناصر الشاشة
    const joinBtn = document.getElementById('joinBtn');
    const nameInput = document.getElementById('playerName');
    const loginScreen = document.getElementById('loginScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const playersList = document.getElementById('playersList');
    const playerCount = document.getElementById('playerCount');

    let myPlayerRef = null;

    // لما اللاعب يضغط زر الدخول
    joinBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if(name !== "") {
        loginScreen.style.display = 'none';
        lobbyScreen.style.display = 'block';

        // إضافة اللاعب لقاعدة البيانات
        const playersRef = ref(db, 'players');
        myPlayerRef = push(playersRef);
        set(myPlayerRef, { name: name });

        // حذف اللاعب تلقائياً إذا قفل الصفحة
        onDisconnect(myPlayerRef).remove();
      } else {
        alert("الرجاء كتابة اسمك قبل الدخول!");
      }
    });

    // مراقبة الغرفة (تحديث الأسماء عند الكل في نفس اللحظة)
    const playersRef = ref(db, 'players');
    onValue(playersRef, (snapshot) => {
      playersList.innerHTML = '';
      let count = 0;
      snapshot.forEach((childSnapshot) => {
        const player = childSnapshot.val();
        let li = document.createElement('li');
        li.innerText = '👤 ' + player.name;
        playersList.appendChild(li);
        count++;
      });
      playerCount.innerText = 'العدد الحالي: ' + count;
    });
  </script>
</body>
</html>
