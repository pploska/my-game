<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة المؤامرة</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      margin: 0;
      padding: 20px;
    }
    .container {
      background-color: #222;
      padding: 30px;
      border-radius: 15px;
      max-width: 400px;
      margin: 50px auto;
      border: 1px solid #c0392b;
      box-shadow: 0 0 20px rgba(192, 57, 43, 0.4);
    }
    h1 { color: #e74c3c; margin-bottom: 5px;}
    p { color: #bdc3c7; margin-bottom: 25px;}
    input {
      padding: 12px; font-size: 16px; width: 80%; border-radius: 8px; border: 1px solid #555;
      background-color: #333; color: white; margin-bottom: 15px; text-align: center;
    }
    input:focus { outline: none; border-color: #e74c3c; }
    button {
      background-color: #c0392b; color: white; border: none; padding: 12px 25px;
      font-size: 16px; border-radius: 8px; cursor: pointer; width: 85%;
      transition: 0.3s; font-weight: bold; margin-bottom: 10px;
    }
    button:hover { background-color: #e74c3c; transform: scale(1.05); }
    .btn-secondary { background-color: #2980b9; }
    .btn-secondary:hover { background-color: #3498db; }
    .btn-success { background-color: #27ae60; width: 100%; font-size: 20px; margin-top: 15px; box-shadow: 0 0 10px rgba(39, 174, 96, 0.5); }
    .btn-success:hover { background-color: #2ecc71; transform: scale(1.02); }
    
    #roomCodeDisplay {
      color: #2ecc71; font-size: 24px; letter-spacing: 3px; margin: 15px 0;
      background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #2ecc71;
    }
    
    /* تصميم قائمة اللاعبين */
    #playersList { list-style: none; padding: 0; font-size: 20px; text-align: right; }
    #playersList li { background-color: #333; margin: 5px 0; padding: 10px; border-radius: 5px; border-right: 4px solid #2ecc71; }
    .owner-item { background-color: #2c3e50 !important; border-right: 4px solid #f1c40f !important; margin-bottom: 20px !important; }
    .owner-badge { background-color: #f1c40f; color: #000; font-size: 12px; padding: 3px 8px; border-radius: 5px; margin-right: 10px; font-weight: bold; vertical-align: middle; }
    
    /* تصميم بطاقات اللعب السرية */
    #roleCard {
      padding: 25px; border-radius: 12px; margin-top: 25px; display: none;
      box-shadow: 0 0 15px rgba(0,0,0,0.5);
    }
    .role-spy { background-color: #8B0000; border: 2px solid #e74c3c; }
    .role-citizen { background-color: #1A5276; border: 2px solid #3498db; }
    .role-title { font-size: 28px; font-weight: bold; margin-bottom: 10px; }
    .spies-list { color: #ffcccc; font-size: 18px; margin-top: 15px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; }
  </style>
</head>
<body>

  <div class="container" id="loginScreen">
    <h1>🕵️‍♂️ المؤامرة</h1>
    <p>أدخل اسمك، ثم اختر إنشاء أو انضمام</p>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." required>
    <hr style="border-color: #444; margin: 20px 0;">
    <button id="createRoomBtn">✨ إنشاء غرفة جديدة</button>
    <hr style="border-color: #444; margin: 20px 0;">
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة (للانضمام فقط)" maxlength="4" style="text-transform: uppercase;">
    <button id="joinRoomBtn" class="btn-secondary">🔗 انضمام للغرفة</button>
  </div>

  <div class="container" id="lobbyScreen" style="display: none;">
    <h1>غرفة الانتظار ⏳</h1>
    <div id="roomCodeDisplay">كود الغرفة: ----</div>
    <p>أرسل هذا الكود لأصدقائك للانضمام</p>
    
    <ul id="playersList"></ul>
    <h3 id="playerCount" style="color: #f1c40f;">العدد الحالي: 0</h3>

    <button id="startGameBtn" class="btn-success" style="display: none;">🚀 بدء اللعبة الآن</button>
    <p id="waitingMessage" style="display: none; color: #3498db; font-weight: bold; margin-top: 15px;">في انتظار مالك الغرفة لبدء اللعبة...</p>
  </div>

  <div class="container" id="gameScreen" style="display: none; border-color: #2ecc71; box-shadow: 0 0 20px rgba(46, 204, 113, 0.4);">
    <h1 style="color: #2ecc71;">بدأت المؤامرة! 🎭</h1>
    <p>إليك بطاقة هويتك السرية. لا ترها لأحد!</p>
    
    <div id="roleCard">
      <div class="role-title" id="myRoleTitle"></div>
      <p id="myRoleDesc"></p>
      <div id="otherSpiesDiv" class="spies-list" style="display: none;"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCu5Hbu2Rqml7_4DICZf8XyM9B4hzbpdOQ",
      authDomain: "ploska-ae755.firebaseapp.com",
      databaseURL: "https://ploska-ae755-default-rtdb.firebaseio.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // العناصر
    const createRoomBtn = document.getElementById('createRoomBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const nameInput = document.getElementById('playerName');
    const roomCodeInput = document.getElementById('roomCodeInput');
    
    const loginScreen = document.getElementById('loginScreen');
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameScreen = document.getElementById('gameScreen');
    
    const roomCodeDisplay = document.getElementById('roomCodeDisplay');
    const playersList = document.getElementById('playersList');
    const playerCount = document.getElementById('playerCount');
    
    const startGameBtn = document.getElementById('startGameBtn');
    const waitingMessage = document.getElementById('waitingMessage');

    const roleCard = document.getElementById('roleCard');
    const myRoleTitle = document.getElementById('myRoleTitle');
    const myRoleDesc = document.getElementById('myRoleDesc');
    const otherSpiesDiv = document.getElementById('otherSpiesDiv');

    let myPlayerRef = null;
    let myPlayerKey = null;
    let currentRoom = "";
    let roomPlayersData = {};

    function generateRoomCode() {
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
      let code = '';
      for (let i = 0; i < 4; i++) { code += chars.charAt(Math.floor(Math.random() * chars.length)); }
      return code;
    }

    function updateGameUI() {
      const myData = roomPlayersData[myPlayerKey];
      if (!myData || !myData.role) return;

      roleCard.style.display = 'block';
      
      if (myData.role === 'متآمر') {
        roleCard.className = 'role-spy';
        myRoleTitle.innerText = '🔪 أنت متآمر';
        myRoleDesc.innerText = 'مهمتك هي خداع الآخرين والسيطرة على اللعبة. تعاون مع زملائك!';
        
        let spies = [];
        for (let key in roomPlayersData) {
          if (key !== myPlayerKey && roomPlayersData[key].role === 'متآمر') {
            spies.push(roomPlayersData[key].name);
          }
        }
        
        otherSpiesDiv.style.display = 'block';
        if (spies.length > 0) {
          otherSpiesDiv.innerHTML = '<strong>زملائك المتآمرون:</strong><br>' + spies.join(' ، ');
        } else {
          otherSpiesDiv.innerHTML = 'أنت المتآمر الوحيد في هذه الجولة!';
        }
      } else {
        roleCard.className = 'role-citizen';
        myRoleTitle.innerText = '🛡️ أنت مواطن صالح';
        myRoleDesc.innerText = 'ابحث عن الخونة المتآمرين ولا تثق بأي شخص! حاول كشفهم قبل فوات الأوان.';
        otherSpiesDiv.style.display = 'none';
      }
    }

    function enterRoom(name, roomCode, isOwner) {
      loginScreen.style.display = 'none';
      lobbyScreen.style.display = 'block';
      roomCodeDisplay.innerText = 'كود الغرفة: ' + roomCode;
      
      if (isOwner) {
        startGameBtn.style.display = 'block';
        waitingMessage.style.display = 'none';
      } else {
        startGameBtn.style.display = 'none';
        waitingMessage.style.display = 'block';
      }

      const roomRef = ref(db, 'rooms/' + roomCode + '/players');
      myPlayerRef = push(roomRef);
      myPlayerKey = myPlayerRef.key;
      
      set(myPlayerRef, { name: name, isOwner: isOwner });
      onDisconnect(myPlayerRef).remove();

      onValue(roomRef, (snapshot) => {
        roomPlayersData = snapshot.val() || {};
        let count = 0;
        let ownerHTML = '';
        let othersHTML = '';

        for (let key in roomPlayersData) {
          const player = roomPlayersData[key];
          count++;
          if (player.isOwner) {
            ownerHTML = `<li class="owner-item">👑 ${player.name} <span class="owner-badge">مالك الغرفة</span></li>`;
          } else {
            othersHTML += `<li>👤 ${player.name}</li>`;
          }
        }

        playersList.innerHTML = ownerHTML + othersHTML;
        playerCount.innerText = 'العدد الحالي: ' + count;

        // تحديث شاشة اللعب إذا كنا داخل اللعبة
        if (gameScreen.style.display === 'block') {
          updateGameUI();
        }
      });

      const gameStateRef = ref(db, 'rooms/' + roomCode + '/status');
      onValue(gameStateRef, (snapshot) => {
        if (snapshot.val() === 'playing') {
          lobbyScreen.style.display = 'none';
          gameScreen.style.display = 'block';
          updateGameUI();
        }
      });
    }

    createRoomBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      if(name === "") { alert("الرجاء كتابة اسمك!"); return; }
      currentRoom = generateRoomCode();
      set(ref(db, 'rooms/' + currentRoom + '/status'), 'waiting');
      enterRoom(name, currentRoom, true);
    });

    joinRoomBtn.addEventListener('click', () => {
      const name = nameInput.value.trim();
      const code = roomCodeInput.value.trim().toUpperCase();
      if(name === "") { alert("الرجاء كتابة اسمك!"); return; }
      if(code.length < 4) { alert("الكود غير صحيح!"); return; }
      currentRoom = code;
      enterRoom(name, currentRoom, false);
    });

    // زر بدء اللعبة: يوزع الأدوار عشوائياً وينقل الجميع
    startGameBtn.addEventListener('click', () => {
      let keys = Object.keys(roomPlayersData);
      
      // خلط اللاعبين بطريقة احترافية (Fisher-Yates)
      for (let i = keys.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [keys[i], keys[j]] = [keys[j], keys[i]];
      }

      // تحديد عدد المتآمرين (متآمر واحد لكل 3 لاعبين كحد أدنى)
      let spyCount = Math.max(1, Math.floor(keys.length / 3)); 
      
      let updates = {};
      keys.forEach((key, index) => {
        // أول مجموعة بعد الخلط يأخذون متآمر، والبقية مواطنين
        updates['rooms/' + currentRoom + '/players/' + key + '/role'] = (index < spyCount) ? 'متآمر' : 'مواطن';
      });
      
      updates['rooms/' + currentRoom + '/status'] = 'playing';
      update(ref(db), updates);
    });

  </script>
</body>
</html>
