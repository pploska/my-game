<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لعبة الصناديق الغامضة</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-dark: #05050a;
      --panel-bg: rgba(10, 10, 20, 0.35); 
      --primary: #00f3ff;
      --primary-glow: rgba(0, 243, 255, 0.5);
      --danger: #ff003c;
      --success: #00ff66;
      --warning: #ffea00;
      --text: #e0e0e0;
    }
    
    body {
      background-color: var(--bg-dark);
      background-image: linear-gradient(rgba(5, 5, 10, 0.5), rgba(15, 15, 25, 0.6)), url('bg.jpg'); 
      background-size: cover;          
      background-position: center;     
      background-attachment: fixed;    
      color: var(--text); 
      font-family: 'Cairo', sans-serif;
      text-align: center; 
      margin: 0; padding: 0; 
      overflow-x: hidden;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      background-image: linear-gradient(rgba(0, 243, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px; z-index: -2;
    }

    .home-btn {
      position: fixed; top: 15px; right: 15px; background: rgba(255, 0, 60, 0.15);
      color: #ff4d6d; border: 1px solid rgba(255, 0, 60, 0.5); padding: 8px 15px;
      border-radius: 20px; z-index: 1000; font-weight: bold; backdrop-filter: blur(5px);
      cursor: pointer; transition: 0.3s; font-family: 'Cairo';
    }
    .home-btn:hover { background: var(--danger); color: #fff; box-shadow: 0 0 15px var(--danger-glow); }

    .container {
      background: var(--panel-bg); padding: 30px; border-radius: 20px; 
      max-width: 600px; margin: 60px auto 40px; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 15px rgba(255, 255, 255, 0.05); 
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1); position: relative; z-index: 10;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    h1, h2, h3 { color: #fff; text-shadow: 0 2px 5px rgba(0,0,0,0.8); margin-bottom: 15px; }
    .highlight { color: var(--primary); text-shadow: 0 0 15px var(--primary-glow); }
    
    button {
      background: linear-gradient(135deg, rgba(0, 180, 219, 0.25), rgba(0, 131, 176, 0.45)); 
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(0, 180, 219, 0.5); color: white; padding: 12px 20px; font-size: 16px; font-family: 'Cairo', sans-serif;
      border-radius: 12px; cursor: pointer; font-weight: 900; margin: 8px; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }
    button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px var(--primary-glow); background: linear-gradient(135deg, rgba(0, 180, 219, 0.4), rgba(0, 131, 176, 0.6)); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    
    .btn-danger { background: linear-gradient(135deg, rgba(255, 0, 85, 0.25), rgba(204, 0, 68, 0.45)); border-color: rgba(255, 0, 85, 0.5); }
    .btn-success { background: linear-gradient(135deg, rgba(0, 176, 155, 0.25), rgba(150, 201, 61, 0.45)); border-color: rgba(0, 255, 102, 0.4); }
    .btn-warning { background: linear-gradient(135deg, rgba(247, 183, 51, 0.25), rgba(252, 74, 26, 0.45)); border-color: rgba(255, 234, 0, 0.5); }

    input {
      padding: 12px; font-size: 16px; font-family: 'Cairo', sans-serif; font-weight: 700; width: 80%; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2);
      background-color: rgba(0, 0, 0, 0.4); color: #fff; margin-bottom: 15px; text-align: center; backdrop-filter: blur(5px);
    }
    input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

    .top-bar {
      position: fixed; top: 0; left: 0; width: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
      padding: 10px 20px; display: flex; justify-content: space-around; align-items: center; z-index: 100;
      border-bottom: 1px solid rgba(0, 243, 255, 0.3); font-weight: bold; font-size: 14px;
    }

    .log-toggle-btn {
      position: fixed; left: 10px; top: 60px; z-index: 101; background: rgba(10,10,20,0.8);
      border: 1px solid var(--primary); color: #fff; padding: 8px 12px; border-radius: 10px;
      cursor: pointer; font-family: 'Cairo'; font-weight: bold; backdrop-filter: blur(5px); font-size: 12px;
    }
    .log-panel {
      position: fixed; left: 10px; top: 105px; width: 220px; max-height: 250px;
      background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 15px; padding: 15px; overflow-y: auto; text-align: right; font-size: 12px; z-index: 100;
      transform: translateX(-150%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .log-panel.open { transform: translateX(0); box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .log-item { margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .log-item span { color: var(--primary); font-weight: bold; }

    .game-area { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; margin-top: 50px; padding: 20px; padding-bottom: 150px; }
    
    .decks-container { display: flex; gap: 20px; margin-bottom: 20px; margin-top: 30px; }
    .deck-card {
      width: 100px; height: 140px; background: linear-gradient(45deg, #1a1a2e, #16213e);
      border: 2px dashed rgba(0, 243, 255, 0.5); border-radius: 12px;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      cursor: pointer; transition: 0.3s; font-weight: bold; color: var(--primary); box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    }
    .deck-card:hover:not(.disabled) { transform: translateY(-10px); box-shadow: 0 15px 25px var(--primary-glow); }
    .deck-card.disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; border-color: #555; color: #777;}

    .player-boxes-area {
      position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); padding: 15px; border-radius: 20px; backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1); text-align: center; z-index: 50; width: 90%; max-width: 450px;
    }
    .boxes-grid { display: flex; gap: 10px; margin-top: 10px; align-items: flex-end; justify-content: center; flex-wrap: wrap;}
    
    .box-wrapper { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .box-item {
      width: 60px; height: 60px; background: linear-gradient(135deg, #8b5a2b, #5c3a18);
      border: 3px solid #3e2710; border-radius: 6px; position: relative;
      display: flex; justify-content: center; align-items: center;
      transition: 0.3s; box-shadow: 0 8px 15px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.5);
    }
    .box-item::after { 
      content: ''; position: absolute; top: 0; left: 12px; right: 12px; bottom: 0;
      border-left: 2px solid rgba(0,0,0,0.15); border-right: 2px solid rgba(0,0,0,0.15); pointer-events: none;
    }
    .box-item::before { 
      content: ''; position: absolute; top: -4px; left: -4px; right: -4px; height: 16px;
      background: linear-gradient(135deg, #a67339, #7a461e); border: 3px solid #3e2710; border-radius: 6px 6px 3px 3px;
      transform-origin: top; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 2; pointer-events: none;
    }
    .box-item.open::before { transform: rotateX(110deg); }
    .box-value {
      opacity: 0; transform: scale(0.5); transition: 0.3s; z-index: 1; color: #fff; text-shadow: 0 0 15px var(--primary); font-size: 26px; font-weight: 900;
    }
    .box-item.open .box-value { opacity: 1; transform: scale(1); }
    .box-item.empty { opacity: 0.2; filter: grayscale(100%); pointer-events: none; border-style: dashed; }

    .box-controls { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }
    .mini-btn { padding: 4px 8px; font-size: 11px; border-radius: 6px; margin: 0; width: auto; font-weight: bold; border:none; color:#fff; cursor: pointer; transition:0.2s;}
    .mini-btn:hover { transform: scale(1.05); }
    .btn-reveal { background: linear-gradient(135deg, #00b09b, #96c93d); box-shadow: 0 2px 5px rgba(0,255,102,0.3); }
    .btn-hide { background: linear-gradient(135deg, #ff0055, #cc0044); box-shadow: 0 2px 5px rgba(255,0,85,0.3); }
    .btn-swap { background: linear-gradient(135deg, #f7b733, #fc4a1a); box-shadow: 0 2px 5px rgba(255,234,0,0.3); }

    .opponent-area { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 10px; }
    .opponent-card { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 12px; border: 1px solid #333; backdrop-filter: blur(5px); }
    .op-boxes { display: flex; gap: 6px; margin-top: 5px; justify-content: center;}
    .mini-box { width: 30px; height: 30px; border-width: 2px; }
    .mini-box::before { height: 8px; border-width: 2px; }
    .mini-box::after { left: 6px; right: 6px; border-width: 1px;}

    .screen { display: none; width: 100%; }
    .active-screen { display: block; }
  </style>
</head>
<body>

  <button id="homeBtn" class="home-btn" style="display: none;">🚪 خروج</button>

  <div class="top-bar" id="topBar" style="display: none;">
    <div>الجولة: <span id="roundUi" class="highlight">1</span></div>
    <div>الدور: <span id="turnUi" style="color: var(--warning);">---</span></div>
    <div>اللاعبين: <span id="playersCountUi">0</span></div>
    <button id="callBtn" class="btn-danger" style="padding: 5px 15px; margin:0; font-size:12px; display:none;">إنهاء الجولة 🛑</button>
  </div>

  <button class="log-toggle-btn" id="logToggleBtn" style="display: none;">📜 سجل الأحداث</button>
  <div class="log-panel" id="actionLog"></div>

  <div class="container screen active-screen" id="loginScreen">
    <h1>📦 <span class="highlight">الصناديق الغامضة</span></h1>
    <p>ذاكرة قوية، خداع ذكي، وأقل مجموع يكسب!</p><br>
    <input type="text" id="playerName" placeholder="اكتب اسمك هنا..." maxlength="15" required>
    <hr style="border: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
    <button id="createRoomBtn">✨ إنشاء غرفة جديدة</button><br>
    <input type="text" id="roomCodeInput" placeholder="كود الغرفة" maxlength="4" style="text-transform: uppercase; margin-top: 15px;">
    <button id="joinRoomBtn" class="btn-warning">🔗 انضمام</button>
  </div>

  <div class="container screen" id="lobbyScreen">
    <h2>غرفة الانتظار ⏳</h2>
    <h1 id="roomCodeDisplay" style="color: var(--primary); letter-spacing: 5px;">----</h1>
    <ul id="lobbyList" style="list-style: none; padding: 0; text-align: right;"></ul>
    <div id="hostControls" style="display: none; margin-top: 20px;">
      <button id="addBotBtn" class="btn-warning" style="font-size: 14px;">🤖 إضافة بوت</button>
      <button id="startGameBtn" class="btn-success">🚀 بدء المباراة</button>
    </div>
    <p id="waitingMsg" style="display:none; color:var(--warning);">بانتظار المالك لبدء اللعبة...</p>
  </div>

  <div class="screen" id="gameScreen">
    <div class="game-area">
      <div class="opponent-area" id="opponentsArea"></div>

      <div class="decks-container">
        <div class="deck-card" id="reserveDeck">📦<br>صندوق احتياطي</div>
        <div class="deck-card" id="actionDeck" style="border-color: var(--warning); color: var(--warning);">🃏<br>بطاقة أكشن</div>
      </div>
      
      <div id="centerMessage" style="font-size: 16px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(0,255,255,0.5); height: 25px;"></div>
    </div>

    <div class="player-boxes-area" id="myBoxesArea">
      <div style="color: #fff; font-weight: bold; margin-bottom: 5px; font-size: 14px;">صناديقي</div>
      <div class="boxes-grid" id="myBoxesGrid"></div>
      <button id="readyPeekBtn" class="btn-success" style="display:none; margin: 15px auto 0; font-size:14px; padding: 8px 20px;">✅ أنا جاهز</button>
    </div>
  </div>

  <div class="container screen" id="endScreen">
    <h1 id="endTitle">نتائج الجولة 📊</h1>
    <div id="resultsList" style="text-align: right; margin-bottom: 20px;"></div>
    <button id="nextRoundBtn" class="btn-success" style="display:none;">الجولة التالية 🔄</button>
    <p id="waitNextMsg" style="display:none;">بانتظار المالك...</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, set, push, onValue, onDisconnect, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCu5Hbu2Rqml7_4DICZf8XyM9B4hzbpdOQ",
      authDomain: "ploska-ae755.firebaseapp.com",
      databaseURL: "https://ploska-ae755-default-rtdb.firebaseio.com",
      projectId: "ploska-ae755",
      storageBucket: "ploska-ae755.firebasestorage.app",
      messagingSenderId: "115680839911",
      appId: "1:115680839911:web:1220fea64c03c3a9137a42"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let myUid = sessionStorage.getItem('boxgame_uid');
    let currentRoom = sessionStorage.getItem('boxgame_room');
    let isOwner = false;
    let roomData = null;
    let botCounter = 1;
    
    const BOT_NAMES = ["روبوت ذكي", "المخادع", "بوت الذاكرة", "الحاسبة"];

    function switchScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
      document.getElementById(id).classList.add('active-screen');
    }

    function addLog(msg) {
      push(ref(db, `rooms/${currentRoom}/log`), { text: msg, time: Date.now() });
    }

    document.getElementById('logToggleBtn').onclick = () => {
      document.getElementById('actionLog').classList.toggle('open');
    };

    document.getElementById('homeBtn').onclick = () => {
      Swal.fire({
        title: 'مغادرة الغرفة؟',
        text: 'هل أنت متأكد؟ سيتم خروجك من الغرفة والمباراة الحالية.',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#ff003c',
        cancelButtonColor: '#333',
        confirmButtonText: 'نعم، خروج',
        cancelButtonText: 'إلغاء',
        background: 'rgba(10, 10, 20, 0.9)', color: '#fff',
        backdrop: `rgba(0,0,0,0.8)`
      }).then((result) => {
        if (result.isConfirmed) {
          if(myUid && currentRoom) update(ref(db, `rooms/${currentRoom}/players/${myUid}`), { connected: false });
          sessionStorage.removeItem('boxgame_uid');
          sessionStorage.removeItem('boxgame_room');
          location.reload();
        }
      });
    };

    async function joinRoom(name, code, asOwner) {
      currentRoom = code;
      isOwner = asOwner;
      document.getElementById('homeBtn').style.display = 'block';
      
      if (!myUid || asOwner || document.getElementById('playerName').value !== "") {
         let newRef = push(ref(db, `rooms/${code}/players`));
         myUid = newRef.key;
         await set(newRef, { name: name, isOwner: asOwner, isBot: false, score: 0, connected: true });
         sessionStorage.setItem('boxgame_uid', myUid);
         sessionStorage.setItem('boxgame_room', code);
         onDisconnect(newRef).update({ connected: false });
      } else {
         await update(ref(db, `rooms/${code}/players/${myUid}`), { connected: true });
         onDisconnect(ref(db, `rooms/${code}/players/${myUid}`)).update({ connected: false });
      }

      onValue(ref(db, `rooms/${code}`), (snapshot) => {
        const data = snapshot.val();
        if (!data) return location.reload();
        roomData = data;
        isOwner = data.players[myUid]?.isOwner || false;
        renderState(data);
      });
    }

    function renderState(data) {
      const status = data.status;
      const me = data.players[myUid];
      const prog = data.actionProgress || { self: false, other: false };
      const act = data.actionState;
      if (!me) return;

      if(data.log) {
        const logPanel = document.getElementById('actionLog');
        logPanel.innerHTML = '';
        Object.values(data.log).sort((a,b)=>a.time-b.time).slice(-15).forEach(l => {
          logPanel.innerHTML += `<div class="log-item">${l.text}</div>`;
        });
        logPanel.scrollTop = logPanel.scrollHeight;
      }

      if (status === 'waiting') {
        switchScreen('lobbyScreen');
        document.getElementById('topBar').style.display = 'none';
        document.getElementById('logToggleBtn').style.display = 'none';
        document.getElementById('roomCodeDisplay').innerText = currentRoom;
        
        let list = '';
        for (let k in data.players) {
          let p = data.players[k];
          let connStatus = p.connected === false ? '<span style="color:#ff003c; font-size:12px;"> (غير متصل)</span>' : '';
          list += `<li style="padding:10px; background:rgba(0,0,0,0.4); margin:5px; border-radius:8px; color:#fff;">
            ${p.name} ${p.isOwner ? '👑' : ''} ${p.isBot ? '🤖' : ''} ${connStatus}
          </li>`;
        }
        document.getElementById('lobbyList').innerHTML = list;
        document.getElementById('hostControls').style.display = isOwner ? 'block' : 'none';
        document.getElementById('waitingMsg').style.display = isOwner ? 'none' : 'block';
      } 
      else if (status === 'init_peek' || status === 'playing') {
        switchScreen('gameScreen');
        document.getElementById('topBar').style.display = 'flex';
        document.getElementById('logToggleBtn').style.display = 'block';
        
        const oppArea = document.getElementById('opponentsArea');
        oppArea.innerHTML = '';
        for (let k in data.players) {
          if (k === myUid) continue;
          let p = data.players[k];
          let connStatus = p.connected === false ? '<span style="color:#ff003c; font-size:10px;"> (مفقود)</span>' : '';
          
          let oppPointer = (data.currentTurn === myUid && (act === 'peek_other' || act === 'peek_both') && !prog.other) ? 'pointer' : 'default';

          let pDiv = document.createElement('div');
          pDiv.className = 'opponent-card';
          pDiv.innerHTML = `<div style="color:#fff; font-size:12px; margin-bottom:5px; font-weight:bold;">${p.name}${connStatus}</div>
          <div class="op-boxes">
            ${p.boxes.map((b, i) => `
              <div class="box-item mini-box ${b.deleted ? 'empty' : ''} ${b.revealedTo === myUid ? 'open' : ''}" 
                   onclick="revealOpponentBox('${k}', ${i})" style="cursor: ${!b.deleted ? oppPointer : 'not-allowed'}">
                   <div class="box-value" style="font-size:16px;">${b.revealedTo === myUid ? b.value : ''}</div>
              </div>`).join('')}
          </div>`;
          oppArea.appendChild(pDiv);
        }

        const myGrid = document.getElementById('myBoxesGrid');
        myGrid.innerHTML = '';
        me.boxes.forEach((box, i) => {
          let bWrapper = document.createElement('div');
          bWrapper.className = 'box-wrapper';

          let boxVisual = document.createElement('div');
          boxVisual.className = `box-item ${box.deleted ? 'empty' : ''} ${box.revealed ? 'open' : ''}`;
          boxVisual.innerHTML = `<div class="box-value">${box.value}</div>`; 

          let controls = document.createElement('div');
          controls.className = 'box-controls';

          if (!box.deleted) {
              if (status === 'init_peek') {
                 let revBtn = document.createElement('button');
                 revBtn.className = 'mini-btn btn-reveal'; revBtn.innerText = '👁️';
                 revBtn.onclick = () => revealMyBox(i);

                 let hidBtn = document.createElement('button');
                 hidBtn.className = 'mini-btn btn-hide'; hidBtn.innerText = '🙈';
                 hidBtn.onclick = () => hideMyBox(i);

                 controls.appendChild(revBtn);
                 controls.appendChild(hidBtn);
              } else if (status === 'playing' && data.currentTurn === myUid) {
                 if ((act === 'peek_self' || act === 'peek_both') && !prog.self) {
                    let revBtn = document.createElement('button');
                    revBtn.className = 'mini-btn btn-reveal'; revBtn.innerText = '👁️ كشف';
                    revBtn.onclick = () => revealMyBox(i);
                    controls.appendChild(revBtn);
                 } else if (act === 'replace_box') {
                    let repBtn = document.createElement('button');
                    repBtn.className = 'mini-btn btn-swap'; repBtn.innerText = '🔄 تبديل';
                    repBtn.onclick = () => replaceMyBox(i);
                    controls.appendChild(repBtn);
                 }
              }
          }

          bWrapper.appendChild(boxVisual);
          bWrapper.appendChild(controls);
          myGrid.appendChild(bWrapper);
        });

        const readyBtn = document.getElementById('readyPeekBtn');
        if (status === 'init_peek') readyBtn.style.display = me.isReady ? 'none' : 'block';
        else readyBtn.style.display = 'none';

        if (status === 'init_peek' && isOwner) {
            let allReady = true;
            for (let k in data.players) {
                if (!data.players[k].isBot && !data.players[k].isReady) { allReady = false; break; }
            }
            if (allReady) {
                update(ref(db, `rooms/${currentRoom}`), { status: 'playing' });
                addLog('🎲 اكتمل الحفظ، بدأ اللعب الحقيقي!');
            }
        }

        const resDeck = document.getElementById('reserveDeck');
        const actDeck = document.getElementById('actionDeck');
        if (status === 'playing' && data.currentTurn === myUid && !act) {
            resDeck.classList.remove('disabled'); actDeck.classList.remove('disabled');
        } else {
            resDeck.classList.add('disabled'); actDeck.classList.add('disabled');
        }

        document.getElementById('roundUi').innerText = data.round || 1;
        document.getElementById('playersCountUi').innerText = Object.keys(data.players).length;
        
        if (data.currentTurn) {
          let turnName = data.players[data.currentTurn].name;
          document.getElementById('turnUi').innerText = turnName;
          
          if (data.currentTurn === myUid && status === 'playing') {
            document.getElementById('callBtn').style.display = 'block';
            if (!act) document.getElementById('centerMessage').innerText = 'دورك! اختر صندوق احتياطي أو بطاقة.';
          } else {
            document.getElementById('callBtn').style.display = 'none';
            document.getElementById('centerMessage').innerText = status === 'init_peek' ? (me.isReady ? 'بانتظار البقية...' : 'اكشف صندوقين ثم اضغط جاهز') : `انتظر دور ${turnName}...`;
          }
        }

        if (isOwner && data.players[data.currentTurn]?.isBot && status === 'playing') handleBotTurn(data.currentTurn);
      }
      else if (status === 'ended') {
        switchScreen('endScreen');
        document.getElementById('topBar').style.display = 'none';
        document.getElementById('logToggleBtn').style.display = 'none';
        
        let resHtml = '';
        let sorted = Object.values(data.players).map(p => {
           let sum = p.boxes.filter(b=>!b.deleted).reduce((acc, b) => acc + b.value, 0);
           return { ...p, roundSum: sum };
        }).sort((a,b)=> a.roundSum - b.roundSum);

        sorted.forEach((p, i) => {
          resHtml += `<div style="background:rgba(0,0,0,0.5); padding:10px; margin:10px 0; border-radius:10px; color:#fff; border: 1px solid rgba(255,255,255,0.1);">
            <b>${i+1}. ${p.name}</b> - المجموع: <span class="highlight">${p.roundSum}</span>
            <div style="font-size:14px; color:#ccc; margin-top:5px; font-weight:bold;">الصناديق: [ ${p.boxes.filter(b=>!b.deleted).map(b=>b.value).join(' - ')} ]</div>
          </div>`;
        });
        document.getElementById('resultsList').innerHTML = resHtml;

        document.getElementById('nextRoundBtn').style.display = isOwner ? 'block' : 'none';
        document.getElementById('waitNextMsg').style.display = isOwner ? 'none' : 'block';
      }
    }

    window.revealOpponentBox = async function(oppUid, idx) {
        if (roomData.status !== 'playing' || roomData.currentTurn !== myUid) return;
        let act = roomData.actionState;
        let prog = roomData.actionProgress || { self: false, other: false };
        let p = roomData.players[oppUid];
        if (p.boxes[idx].deleted) return;

        if ((act === 'peek_other' || act === 'peek_both') && !prog.other) {
            await update(ref(db, `rooms/${currentRoom}/actionProgress/other`), true);
            await update(ref(db, `rooms/${currentRoom}/players/${oppUid}/boxes/${idx}`), { revealedTo: myUid });

            setTimeout(async () => {
                await update(ref(db, `rooms/${currentRoom}/players/${oppUid}/boxes/${idx}/revealedTo`), null);
                checkBothDone();
            }, 2500);
        }
    };

    window.revealMyBox = async function(idx) {
        let me = roomData.players[myUid];
        let act = roomData.actionState;
        let prog = roomData.actionProgress || { self: false, other: false };

        if (roomData.status === 'init_peek') {
            let peeks = me.peekedBoxes || [];
            if (!peeks.includes(idx)) {
                if (peeks.length >= 2) {
                    Swal.fire({icon: 'error', title: 'تنبيه', text: 'كحد أقصى صندوقين!', toast: true, position: 'top', showConfirmButton: false, timer: 2000, background: '#111', color:'#fff'});
                    return;
                }
                peeks.push(idx);
                await update(ref(db, `rooms/${currentRoom}/players/${myUid}`), { peekedBoxes: peeks });
            }
            await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { revealed: true });
        } 
        else if (roomData.status === 'playing' && (act === 'peek_self' || act === 'peek_both') && !prog.self) {
            await update(ref(db, `rooms/${currentRoom}/actionProgress/self`), true);
            await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { revealed: true });

            setTimeout(async () => {
                await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}/revealed`), false);
                checkBothDone();
            }, 2500);
        }
    };

    window.hideMyBox = async function(idx) {
        await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { revealed: false });
    };

    window.replaceMyBox = async function(idx) {
        let newVal = roomData.drawnBoxValue;
        await update(ref(db, `rooms/${currentRoom}/players/${myUid}/boxes/${idx}`), { value: newVal, revealed: false });
        await update(ref(db, `rooms/${currentRoom}/actionState`), null);
        addLog(`🔄 <span>${roomData.players[myUid].name}</span> استبدل صندوقه.`);
        nextTurn();
    };

    window.checkBothDone = async function() {
        let act = roomData.actionState;
        let prog = roomData.actionProgress || { self: false, other: false };
        let shouldEnd = false;
        
        if (act === 'peek_self' && prog.self) shouldEnd = true;
        if (act === 'peek_other' && prog.other) shouldEnd = true;
        if (act === 'peek_both' && prog.self && prog.other) shouldEnd = true;

        if (shouldEnd && act !== 'done') {
            await update(ref(db, `rooms/${currentRoom}/actionState`), 'done');
            nextTurn();
        }
    };

    document.getElementById('readyPeekBtn').onclick = async () => {
        let updates = {};
        roomData.players[myUid].boxes.forEach((b, i) => {
            if (b.revealed) updates[`rooms/${currentRoom}/players/${myUid}/boxes/${i}/revealed`] = false;
        });
        updates[`rooms/${currentRoom}/players/${myUid}/isReady`] = true;
        await update(ref(db), updates);
    };

    document.getElementById('reserveDeck').onclick = async () => {
      if (roomData.status !== 'playing' || roomData.currentTurn !== myUid || roomData.actionState) return;
      let val = Math.floor(Math.random() * 14);
      await update(ref(db, `rooms/${currentRoom}`), { actionState: 'replace_box', drawnBoxValue: val });
      document.getElementById('centerMessage').innerText = `سحبت الرقم (${val}). اختر صندوق للتبديل!`;
      addLog(`📦 <span>${roomData.players[myUid].name}</span> سحب صندوقاً احتياطياً.`);
    };

    document.getElementById('actionDeck').onclick = async () => {
      if (roomData.status !== 'playing' || roomData.currentTurn !== myUid || roomData.actionState) return;
      
      let actions = ['peek_self', 'peek_other', 'peek_both', 'delete_self'];
      let act = actions[Math.floor(Math.random() * actions.length)];
      
      let updates = {
          [`rooms/${currentRoom}/actionState`]: act,
          [`rooms/${currentRoom}/actionProgress`]: { self: false, other: false }
      };

      if (act === 'peek_self') {
        document.getElementById('centerMessage').innerText = `بطاقة: اكشف صندوقك. (اضغط على 👁️ تحت صندوقك)`;
        addLog(`🃏 <span>${roomData.players[myUid].name}</span> سحب بطاقة: اكشف صندوقك.`);
      } else if (act === 'peek_other') {
        document.getElementById('centerMessage').innerText = `بطاقة: اكشف صندوق خصم. (اضغط على صندوق خصم)`;
        addLog(`🃏 <span>${roomData.players[myUid].name}</span> سحب بطاقة: اكشف صندوق خصم.`);
      } else if (act === 'peek_both') {
        document.getElementById('centerMessage').innerText = `بطاقة: اكشف صندوقك وصندوق خصم.`;
        addLog(`🃏 <span>${roomData.players[myUid].name}</span> سحب بطاقة: اكشف صندوقك وصندوق خصم.`);
      } else {
        updates[`rooms/${currentRoom}/actionState`] = 'processing_auto';
        let myBoxes = roomData.players[myUid].boxes;
        let validIds = [0,1,2,3].filter(i => !myBoxes[i].deleted);
        if(validIds.length > 1) {
          let rId = validIds[Math.floor(Math.random() * validIds.length)];
          updates[`rooms/${currentRoom}/players/${myUid}/boxes/${rId}/deleted`] = true;
          addLog(`💥 <span>${roomData.players[myUid].name}</span> سحب بطاقة حذف وتخلص من صندوق!`);
        }
        setTimeout(() => nextTurn(), 2000);
      }
      await update(ref(db), updates);
    };

    document.getElementById('callBtn').onclick = async () => {
      await update(ref(db, `rooms/${currentRoom}`), { calledBy: myUid });
      addLog(`🚨 <span>${roomData.players[myUid].name}</span> فعّل إنهاء الجولة!`);
      nextTurn();
    };

    async function nextTurn() {
      let order = roomData.turnOrder;
      let currIdx = order.indexOf(roomData.currentTurn);
      let nextIdx = (currIdx + 1) % order.length;
      let nextUid = order[nextIdx];

      if (roomData.calledBy === nextUid) {
         await update(ref(db, `rooms/${currentRoom}/status`), 'ended');
         addLog('🏁 انتهت الجولة! جاري كشف الصناديق وحساب النقاط...');
      } else {
         let updates = {};
         updates[`rooms/${currentRoom}/currentTurn`] = nextUid;
         updates[`rooms/${currentRoom}/actionState`] = null; 
         updates[`rooms/${currentRoom}/actionProgress`] = null;
         await update(ref(db), updates);
      }
    }

    let botTimeout = null;
    function handleBotTurn(botUid) {
      clearTimeout(botTimeout);
      botTimeout = setTimeout(async () => {
        if(roomData.status !== 'playing' || roomData.currentTurn !== botUid) return;
        
        let p = roomData.players[botUid];
        let validIds = [0,1,2,3].filter(i => !p.boxes[i].deleted);
        
        if (Math.random() > 0.5) {
           let newVal = Math.floor(Math.random() * 14);
           let replaceId = validIds[Math.floor(Math.random() * validIds.length)];
           await update(ref(db, `rooms/${currentRoom}/players/${botUid}/boxes/${replaceId}`), { value: newVal });
           addLog(`🤖 <span>${p.name}</span> استبدل أحد صناديقه.`);
           setTimeout(() => { if (isOwner && roomData.currentTurn === botUid) nextTurn(); }, 1500);
        } else {
           let actions = ['peek_self', 'peek_other', 'peek_both', 'delete_self'];
           let act = actions[Math.floor(Math.random() * actions.length)];
           if (act === 'peek_self') addLog(`🤖 <span>${p.name}</span> كشف أحد صناديقه.`);
           else if (act === 'peek_other') addLog(`🤖 <span>${p.name}</span> كشف صندوق لاعب آخر.`);
           else if (act === 'peek_both') addLog(`🤖 <span>${p.name}</span> كشف صندوقه وصندوق لاعب آخر.`);
           else {
             if(validIds.length > 1) {
                let rId = validIds[Math.floor(Math.random() * validIds.length)];
                await update(ref(db, `rooms/${currentRoom}/players/${botUid}/boxes/${rId}/deleted`), true);
                addLog(`🤖 <span>${p.name}</span> استخدم بطاقة حذف!`);
             }
           }
           
           let currentSum = p.boxes.filter(b=>!b.deleted).reduce((a,b)=>a+b.value, 0);
           if (currentSum < 15 && !roomData.calledBy && Math.random() > 0.7) {
              await update(ref(db, `rooms/${currentRoom}`), { calledBy: botUid });
              addLog(`🚨 <span>${p.name}</span> أنهى الجولة!`);
           }
           setTimeout(() => { if (isOwner && roomData.currentTurn === botUid) nextTurn(); }, 2500);
        }
      }, 3000);
    }

    document.getElementById('createRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim();
      if(!name) return;
      const code = Math.random().toString(36).substr(2, 4).toUpperCase();
      set(ref(db, `rooms/${code}`), { status: 'waiting', log: {}, round: 1 });
      joinRoom(name, code, true);
    };

    document.getElementById('joinRoomBtn').onclick = () => {
      const name = document.getElementById('playerName').value.trim();
      const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
      if(!name || code.length < 4) return;
      joinRoom(name, code, false);
    };

    document.getElementById('addBotBtn').onclick = () => {
      let bName = BOT_NAMES[Math.floor(Math.random() * BOT_NAMES.length)] + ` ${botCounter++}`;
      push(ref(db, `rooms/${currentRoom}/players`), { name: bName, isOwner: false, isBot: true, score: 0 });
    };

    document.getElementById('startGameBtn').onclick = async () => startNewRound(1);
    document.getElementById('nextRoundBtn').onclick = async () => startNewRound(roomData.round + 1);

    async function startNewRound(roundNum) {
      let updates = {};
      updates[`rooms/${currentRoom}/status`] = 'init_peek';
      updates[`rooms/${currentRoom}/round`] = roundNum;
      updates[`rooms/${currentRoom}/calledBy`] = null;
      updates[`rooms/${currentRoom}/actionState`] = null;
      
      let pKeys = Object.keys(roomData.players);
      updates[`rooms/${currentRoom}/turnOrder`] = pKeys.sort(() => Math.random() - 0.5);
      updates[`rooms/${currentRoom}/currentTurn`] = pKeys[0];
      
      pKeys.forEach(k => {
        let boxes = [];
        for(let i=0; i<4; i++) boxes.push({ value: Math.floor(Math.random() * 14), deleted: false, revealed: false });
        updates[`rooms/${currentRoom}/players/${k}/boxes`] = boxes;
        updates[`rooms/${currentRoom}/players/${k}/peekedBoxes`] = [];
        updates[`rooms/${currentRoom}/players/${k}/isReady`] = false;
      });

      updates[`rooms/${currentRoom}/log`] = null;
      await update(ref(db), updates);
      addLog('🚀 بدأت الجولة! اكشف صندوقين لمعرفة أرقامك، ثم اضغط على زر (أنا جاهز).');
    }

    window.onload = () => {
      if (myUid && currentRoom) joinRoom("", currentRoom, false); 
      else switchScreen('loginScreen');
    };
  </script>
</body>
</html>
